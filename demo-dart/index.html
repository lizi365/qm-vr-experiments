// ---------- 命中标记：飞镖穿越靶平面的精确碰撞点，短暂显示一个亮色小球 ----------
// 目的是让"环数怎么算出来的"这件事可以被肉眼验证——标记点跟视觉上感觉
// 命中的位置对不上，就说明是碰撞检测算错了，而不是主观空间感知有偏差。
const HIT_MARKER_LIFETIME = 2000; // ms，每个标记停留多久
const HIT_MARKER_MAX = 3; // 最多同时保留几个，超过就把最老的立刻收掉
const hitMarkers = []; // { mesh, createdAt }
const hitMarkerGeo = new THREE.SphereGeometry(0.018, 12, 12);

// 2026-07-11第十三轮：z参数默认TARGET_POS.z(第一关固定靶面的深度，跟
// 之前完全一样)，但第二/三关的敌人有自己的深度巡逻范围，不再固定等于
// TARGET_POS.z——resolveThrow那边命中敌人时会传入敌人实际的z坐标，让
// 标记点跟敌人本体真正对齐，而不是永远画在靶面那个固定平面上。
function spawnHitMarker(x, y, color, z = TARGET_POS.z) {
  const mat = new THREE.MeshBasicMaterial({ color, transparent: true });
  const mesh = new THREE.Mesh(hitMarkerGeo, mat);
  mesh.position.set(x, y, z + 0.006); // 稍微往摄像机方向偏一点，避免z-fighting
  scene.add(mesh);
  hitMarkers.push({ mesh, createdAt: performance.now() });

  while (hitMarkers.length > HIT_MARKER_MAX) {
    const old = hitMarkers.shift();
    scene.remove(old.mesh);
    old.mesh.material.dispose(); // geometry是共享的hitMarkerGeo，不dispose
  }
}

function updateHitMarkers(now) {
  for (let i = hitMarkers.length - 1; i >= 0; i--) {
    const m = hitMarkers[i];
    const age = now - m.createdAt;
    if (age > HIT_MARKER_LIFETIME) {
      scene.remove(m.mesh);
      m.mesh.material.dispose();
      hitMarkers.splice(i, 1);
    } else {
      // 快到寿命尽头时淡出，而不是直接消失，观感更柔和
      m.mesh.material.opacity = Math.min(1, (HIT_MARKER_LIFETIME - age) / 400);
    }
  }
}

function colorForScore(scoreValue) {
  const ring = RINGS.find((r) => r.score === scoreValue);
  return ring ? ring.color : '#666666'; // 脱靶(0分)用灰色标记，跟计分环颜色区分开
}

// ---------- 番茄命中效果："砸扁"缩放动画 + 几片果肉飞溅 ----------
// 独立生成一个临时的装饰性splat效果，不是拿真正的番茄物体去做变形——真正
// 的番茄物体命中后跟其他物体一样立刻resetDartToIdle飞回中性位置，如果直接
// 在它身上做形变动画，飞回去的过程会同时在"跑"和"变形"，观感很怪。这个
// 做法跟命中标记点/评级文字的生命周期管理是同一套模式。
const SPLAT_LIFETIME = 550; // ms
const MAX_SPLAT_EFFECTS = 10; // 同屏最多保留几个溅落效果，超过时先淘汰最老的一个，避免连击刷屏时贴图/网格堆积
const splatEffects = []; // { splatMesh, chunkMeshes: [{mesh, vel}], createdAt }

function spawnTomatoSplat(x, y) {
  if (splatEffects.length >= MAX_SPLAT_EFFECTS) {
    const oldest = splatEffects.shift();
    scene.remove(oldest.splatMesh);
    oldest.splatMesh.material.dispose();
    for (const c of oldest.chunkMeshes) {
      scene.remove(c.mesh);
      c.mesh.material.dispose();
    }
  }
  const splatMat = new THREE.MeshBasicMaterial({ color: 0xcc2a1e, transparent: true });
  const splatMesh = new THREE.Mesh(new THREE.SphereGeometry(0.045, 10, 8), splatMat);
  splatMesh.position.set(x, y, TARGET_POS.z + 0.008);
  scene.add(splatMesh);

  // 2~3片果肉飞溅碎片，简单的小平面朝外飞散，不做液体模拟
  const chunkCount = 2 + Math.floor(Math.random() * 2);
  const chunkMeshes = [];
  for (let i = 0; i < chunkCount; i++) {
    const chunkMat = new THREE.MeshBasicMaterial({ color: 0xdd3322, transparent: true, side: THREE.DoubleSide });
    const chunk = new THREE.Mesh(new THREE.PlaneGeometry(0.018, 0.018), chunkMat);
    chunk.position.set(x, y, TARGET_POS.z + 0.01);
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.35 + Math.random() * 0.45;
    const vel = new THREE.Vector3(Math.cos(angle) * speed, 0.25 + Math.random() * 0.35, (Math.random() - 0.5) * 0.15);
    scene.add(chunk);
    chunkMeshes.push({ mesh: chunk, vel });
  }

  splatEffects.push({ splatMesh, chunkMeshes, createdAt: performance.now() });
}

function updateSplatEffects(dt) {
  const now = performance.now();
  for (let i = splatEffects.length - 1; i >= 0; i--) {
    const eff = splatEffects[i];
    const age = now - eff.createdAt;
    const t = Math.min(age / SPLAT_LIFETIME, 1);

    if (t >= 1) {
      scene.remove(eff.splatMesh);
      eff.splatMesh.material.dispose();
      for (const c of eff.chunkMeshes) {
        scene.remove(c.mesh);
        c.mesh.material.dispose();
      }
      splatEffects.splice(i, 1);
      continue;
    }

    // 命中瞬间前120ms快速压扁（Y轴骤减、XZ轴增大），模拟"砸扁"的形变，
    // 之后维持压扁状态慢慢淡出
    const squashT = Math.min(age / 120, 1);
    const squashY = 1 - squashT * 0.75;
    const squashXZ = 1 + squashT * 0.9;
    eff.splatMesh.scale.set(squashXZ, squashY, squashXZ);
    eff.splatMesh.material.opacity = 1 - t;

    for (const c of eff.chunkMeshes) {
      c.vel.y -= 1.5 * dt; // 比真实重力轻，飞溅的果肉碎片飘得慢一点更好看
      c.mesh.position.addScaledVector(c.vel, dt);
      c.mesh.material.opacity = 1 - t;
      c.mesh.quaternion.copy(camera.quaternion); // 碎片是平面，朝向摄像机看起来更自然
    }
  }
}

// ---------- 斧头落点视觉反馈：劈砍冲击印记 ----------
// 2026-07-11第十轮：之前飞镖有扎入效果、番茄有砸扁飞溅效果，斧头命中后
// 只有靶面震动+音效，没有落点标记，玩家看不出自己劈中了哪个具体位置、
// 偏了多少。这次补上，风格要跟飞镖的"扎入"、番茄的"飞溅"都区分开——
// 不用动态飞溅碎片(那是番茄的标志)，做成偏静态的"冲击裂纹"印记：用Canvas
// 画一个不规则深色印记+几条放射状短裂纹线，呼应斧头本身"钝重感"的设定
// (跟已有的靶面震动+低沉音效是同一路数)。停留时间比番茄(550ms)长很多
// (2.2秒)，前70%时间基本不透明、最后30%才淡出——"劈砍印记"应该是砸出来
// 停留一阵子的痕迹，不是转瞬即逝的动态效果，这点也跟番茄刻意做出差异。
const AXE_IMPACT_LIFETIME = 2200; // ms
const MAX_AXE_IMPACTS = 8; // 同屏最多保留几个印记，超过时淘汰最老的一个，跟番茄溅落效果同样的防刷屏逻辑
const axeImpacts = []; // { mesh, createdAt }

function buildAxeImpactTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 128;
  canvas.height = 128;
  const ctx = canvas.getContext('2d');
  const cx = 64, cy = 64;

  // 中心不规则深色印记：几个大小/偏移不同的圆叠加，避免看起来是一个太
  // 规整的正圆点
  ctx.fillStyle = 'rgba(40, 32, 26, 0.88)';
  for (const [dx, dy, r] of [[0, 0, 22], [8, -6, 14], [-9, 5, 13], [5, 9, 11], [-6, -8, 10]]) {
    ctx.beginPath();
    ctx.arc(cx + dx, cy + dy, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // 放射状裂纹短线：角度/长度都做随机扰动，模拟劈砍冲击留下的不规则裂纹，
  // 而不是规整的星形图案
  ctx.strokeStyle = 'rgba(28, 22, 18, 0.75)';
  ctx.lineWidth = 2.5;
  const crackCount = 6;
  for (let i = 0; i < crackCount; i++) {
    const angle = (i / crackCount) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
    const len = 20 + Math.random() * 18;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(angle) * len, cy + Math.sin(angle) * len);
    ctx.stroke();
  }

  return new THREE.CanvasTexture(canvas);
}

function spawnAxeImpact(x, y) {
  if (axeImpacts.length >= MAX_AXE_IMPACTS) {
    const oldest = axeImpacts.shift();
    scene.remove(oldest.mesh);
    oldest.mesh.material.map.dispose();
    oldest.mesh.material.dispose();
  }
  const texture = buildAxeImpactTexture();
  const mat = new THREE.MeshBasicMaterial({ map: texture, transparent: true, depthTest: false });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(0.09, 0.09), mat);
  mesh.position.set(x, y, TARGET_POS.z + 0.008);
  mesh.rotation.z = Math.random() * Math.PI * 2; // 随机旋转贴图朝向，避免每次印记看起来都一模一样
  scene.add(mesh);
  axeImpacts.push({ mesh, createdAt: performance.now() });
}

function updateAxeImpacts(now) {
  for (let i = axeImpacts.length - 1; i >= 0; i--) {
    const eff = axeImpacts[i];
    const age = now - eff.createdAt;
    const t = Math.min(age / AXE_IMPACT_LIFETIME, 1);
    if (t >= 1) {
      scene.remove(eff.mesh);
      eff.mesh.material.map.dispose();
      eff.mesh.material.dispose();
      axeImpacts.splice(i, 1);
      continue;
    }
    const fadeStart = 0.7; // 前70%时间基本不透明，最后30%才淡出
    eff.mesh.material.opacity = t < fadeStart ? 1 : 1 - (t - fadeStart) / (1 - fadeStart);
  }
}

function updateTargetShake(dt) {
  if (targetShakeTime <= 0) {
    targetShakeTime = 0;
    // 确保没有抖动时精确回到原位，避免浮点误差累积
    targetMesh.position.copy(TARGET_POS);
    backboard.position.copy(TARGET_POS).add(new THREE.Vector3(0, 0, -0.02));
    return;
  }
  targetShakeTime -= dt;
  const intensity = Math.max(targetShakeTime / TARGET_SHAKE_DURATION, 0) * 0.02;
  const offsetX = (Math.random() - 0.5) * intensity;
  const offsetY = (Math.random() - 0.5) * intensity;
  targetMesh.position.set(TARGET_POS.x + offsetX, TARGET_POS.y + offsetY, TARGET_POS.z);
  backboard.position.set(TARGET_POS.x + offsetX, TARGET_POS.y + offsetY, TARGET_POS.z - 0.02);
}

// ---------- 命中判定：飞镖飞行过程中，每帧检测是否穿过靶所在的平面 ----------
// hitPoint为{x,y,dist}表示这一次确实穿过了靶平面（不管有没有落在环内），
// 为null表示是"落地/超时"兜底判的脱靶，没有真实穿越点可标记。
// 2026-07-11第十一轮：新增第三个参数forcedEnemyHit——第二/三关的移动目标物
// 现在用checkMovingEnemySphereHit()逐帧做3D球体检测(见该函数上方的说明)，
// 命中判定和敌人状态变更(消失/重生)都已经在那个函数里完成了，这里不需要
// 也不应该再重新用旧的2D距离逻辑判一次；调用方(updateFlying)检测到命中
// 时会传forcedEnemyHit=true，直接告诉这里"这就是一次确认过的命中"。如果
// 走到这个函数时forcedEnemyHit是false(默认值)，说明是受保护的靶平面
// 穿越检测那条路径触发的调用——对第一关来说这仍然是原来的环数计分；
// 对第二/三关来说，由于命中已经在3D球体检测那一关就会被拦截掉(见
// updateFlying里的调用顺序)，能走到这里说明必然是脱靶，不需要再检测。
function resolveThrow(scoreValue, hitPoint, forcedEnemyHit = false) {
  console.log('[throw] resolveThrow被调用, scoreValue =', scoreValue, ', hitPoint =', hitPoint, ', itemType =', currentItemType, ', level =', currentLevel, ', forcedEnemyHit =', forcedEnemyHit);
  // 2026-07-11第十四轮：拖尾"时灵时不灵"排查用的诊断日志——每次投掷结束
  // 时打印这一次的初速度和拖尾粒子总数，不依赖桌面模拟的间接验证，下次
  // 真机测试时直接从控制台读这几行数字，找真实的速度/粒子数对应关系。
  console.log(`[拖尾诊断] itemType=${currentItemType} 初速度=${lastThrowSpeed.toFixed(2)}m/s 飞行时长=${flightTime.toFixed(3)}s 本次拖尾粒子总数=${flightSparkCount}`);
  throwCount += 1;
  lastHitDistance = hitPoint ? hitPoint.dist : null;

  // 第一关(靶场)：跟之前完全一样，scoreValue就是scoreForDistance()算出来的
  // 环数分，直接当"这一杆的原始分"用。
  //
  // 第二/三关(敌人关卡)：命中判定已经不再依赖"投掷物穿过靶平面的2D落点"
  // 了(那套逻辑是给z固定不变的敌人设计的，敌人加入z轴巡逻之后已经不
  // 适用，见checkMovingEnemySphereHit的说明)。现在命中与否直接读
  // forcedEnemyHit这个由调用方预先算好的结果，命中给ENEMY_HIT_SCORE
  // 这个固定分值，传入的scoreValue参数在这两关没有意义，忽略掉。
  let effectiveScore;
  let hitSomething;
  let enemyHit = false; // 只有第二/三关会用到，第一关始终保持false

  if (currentLevel === 0) {
    effectiveScore = scoreValue;
    hitSomething = !!hitPoint;
    lastScore = scoreValue;
    totalScore += scoreValue;
    if (hitPoint) {
      spawnHitMarker(hitPoint.x, hitPoint.y, colorForScore(scoreValue));
      spawnRatingText(hitPoint.x, hitPoint.y, scoreValue);
    }
  } else {
    enemyHit = forcedEnemyHit;
    effectiveScore = enemyHit ? ENEMY_HIT_SCORE : 0;
    hitSomething = enemyHit;
    lastScore = effectiveScore;
    totalScore += effectiveScore;
    if (enemyHit) {
      // 2026-07-11第十三轮：markerColor之前给斧头写死'#99aabb'，跟这轮
      // 改掉的旧尾焰色是同一个数值——现在斧头本身已经不用这个颜色了，
      // 这里同步换成新的暖色调，标记点/尾焰颜色统一。
      // x/y/z都用hitPoint(checkMovingEnemySphereHit返回的敌人真实位置
      // 快照)，不再假设敌人停留在TARGET_POS.z这个固定平面上。
      const markerColor = currentItemType === 'tomato' ? '#ff5544' : '#ffcc66';
      spawnHitMarker(hitPoint.x, hitPoint.y, markerColor, hitPoint.z);
      spawnRatingText(hitPoint.x, hitPoint.y, ENEMY_HIT_SCORE, hitPoint.z); // ENEMY_HIT_SCORE=8，复用现成的"GREAT!"评级
    }
  }

  // 差异化视觉反馈：只在真的命中了什么(靶环内/敌人)的时候才触发，脱靶
  // 不触发。飞镖不额外加任何东西，保持跟之前完全一样的表现。
  // 2026-07-11第十三轮：第二/三关命中敌人(enemyHit)不再走"落点特效"这套
  // (spawnTomatoSplat/spawnAxeImpact是生成在一个独立坐标上的装饰物，跟
  // 敌人本体是两个不同的Object3D，这正是"命中特效跟动物对不上"这条反馈的
  // 另一面表现)，改成triggerEnemyHitReaction()直接在敌人自己身上播放
  // "被击毙"动画(定身扎入/砸扁沾渍/震动倒地，按武器类型区分，见该函数
  // 说明)。第一关(靶场)和"番茄/斧头打偏但穿过靶平面"这两种情况没有具体
  // 的敌人可以附着，继续用原来的独立落点特效，这两条分支不变。
  if (hitSomething) {
    if (currentLevel !== 0 && enemyHit) {
      triggerEnemyHitReaction(currentItemType);
    } else if (currentItemType === 'tomato') {
      spawnTomatoSplat(hitPoint.x, hitPoint.y);
    } else if (currentItemType === 'axe') {
      triggerTargetShake();
      spawnAxeImpact(hitPoint.x, hitPoint.y);
    }
  } else if (currentLevel !== 0 && hitPoint && (currentItemType === 'tomato' || currentItemType === 'axe')) {
    // 番茄/斧头穿过了靶平面但没打中狐狸/老鼠——之前这种情况完全没有任何
    // 落点反馈，玩家不知道自己到底偏了多少、偏向哪边。这里复用跟"命中"
    // 完全一样的效果(番茄溅落/斧头劈砍印记)，落在投掷物实际穿过靶平面的
    // 坐标上，让偏差可视化，作用类似命中标记(spawnHitMarker)之于第一关：
    // 给玩家一个诊断"我刚才差多少"的视觉锚点。只有hitPoint存在(投掷物
    // 确实飞到了靶平面)才有坐标可用；如果是中途落地/超时(hitPoint为
    // null)，没有明确落点，不生成对应效果。
    if (currentItemType === 'tomato') spawnTomatoSplat(hitPoint.x, hitPoint.y);
    else spawnAxeImpact(hitPoint.x, hitPoint.y);
  }

  // 音效不管命不命中都会响，保持"每次投掷都有声音反馈"的一致行为
  if (currentItemType === 'tomato') {
    playTomatoHitSound();
  } else if (currentItemType === 'axe') {
    playAxeHitSound();
  } else {
    playHitSound(scoreValue);
  }

  applyScoreAndCombo(effectiveScore);

  if (currentLevel === 0 && !hasThrownOnce) {
    hasThrownOnce = true;
    drawHintText(); // 第一次投掷完成(不管命不命中)，隐藏教学提示
  }

  resetDartToIdle();
}

const prevDartPos = new THREE.Vector3();
const newDartPos = new THREE.Vector3();

function updateFlying(dt) {
  prevDartPos.copy(dart.position);

  dartVelocity.y -= GRAVITY * dt;
  newDartPos.copy(dart.position).addScaledVector(dartVelocity, dt);
  dart.position.copy(newDartPos);

  // 飞镖朝向速度方向（镖尖冲前），只在速度足够大时更新朝向，避免速度接近0时orientation抖动
  if (dartVelocity.lengthSq() > 0.0001) {
    const lookTarget = newDartPos.clone().add(dartVelocity.clone().normalize());
    dart.lookAt(lookTarget);
    // 2026-07-11第十四轮：真机反馈斧头飞行时是"侧面横向飞出去"，不是
    // "斧刃朝向目标"。排查后发现：第十三轮把斧头重新设计成"石块+垂直
    // 木柄"的经典静态剪影后，石块的长轴(前后段的"刃部到根部"方向)在
    // 本地坐标系里主要沿着local X轴分布，而不是沿local Z——这个安排是
    // 刻意的，为的是让斧头在"静止/桌面预览"这类不怎么转动的视角下，
    // 长轴垂直于视线方向，呈现出完整可辨认的斧头轮廓(如果长轴沿Z，
    // 静止时看到的反而是最窄的侧影，看起来更像一根棍子)。但lookAt()
    // 只会把整个group的本地-Z轴转去对准飞行方向，本地X轴依然只是
    // "垂直于飞行方向"的某个朝向，这就是"侧面横向飞出"的根因——静止
    // 展示和飞行朝向这两个需求对同一套本地坐标安排来说是矛盾的，没办法
    // 用同一次旋转同时满足。这里的做法是只在斧头飞行时，在lookAt()
    // 算出的朝向基础上，额外绕物体自身刚更新出来的本地Y轴转90度，把
    // 石块的长轴("原本沿X")转到跟本地-Z(飞行方向)对齐，让斧刃在飞行
    // 中读起来是"朝前劈出去"而不是"侧向掠过"；静止展示(桌面预览/物品
    // 选择图标)不经过这条飞行专属分支，剪影完全不受影响。飞镖/番茄
    // 不需要这个修正——飞镖的镖尖本来就设计在本地-Z方向，番茄是球体，
    // 旋转朝向本来就看不出差异。
    if (currentItemType === 'axe') {
      dart.rotateY(-Math.PI / 2);
    }
  }

  // ---- 拖尾火星特效：只读当前速度/位置生成装饰性粒子，不反过来影响物理 ----
  // 飞得越快尾焰越密集，直接复用上面刚算出来的dartVelocity，不引入新的
  // 速度概念。currentTrailColor在多物体切换加进来后会按投掷物类型变化。
  const speedFactor = THREE.MathUtils.clamp(dartVelocity.length() / 8, 0, 1);
  const sparkCount = 1 + Math.round(speedFactor * 2);
  const tailWorld = dart.localToWorld(new THREE.Vector3(0, 0, 0.06));
  const sparkBackward = dartVelocity.clone().normalize().multiplyScalar(-1);
  for (let s = 0; s < sparkCount; s++) {
    flightSparkCount++; // 第十四轮新增的诊断计数，配合resolveThrow里的一次性日志用
    spawnSpark(tailWorld, sparkBackward, speedFactor, currentTrailColor);
  }

  flightTime += dt;

  // 2026-07-11第十一轮新增：第二/三关的移动目标物用3D球体检测，每帧都测，
  // 不等到穿越固定靶平面那一刻——这一段只在currentLevel!==0时生效，加在
  // 下面受保护的靶平面穿越检测(crossedPlane)之前，命中就直接resolveThrow
  // +return，不会执行到下面那一段；如果没命中(包括第一关，或者第二/三关
  // 但没打中)，会正常往下走到原来完全没有改动过的crossedPlane检测。
  // 第一关(currentLevel===0)不会进入这个分支，跟以前完全一样。
  if (currentLevel !== 0) {
    const enemyHitPoint = checkMovingEnemySphereHit(prevDartPos, newDartPos);
    if (enemyHitPoint) {
      resolveThrow(ENEMY_HIT_SCORE, enemyHitPoint, true);
      return;
    }
  }

  // ---- 判断这一帧是否穿过靶平面（TARGET_POS.z），用线性插值找穿越瞬间的精确落点 ----
  const crossedPlane =
    (prevDartPos.z > TARGET_POS.z && newDartPos.z <= TARGET_POS.z) ||
    (prevDartPos.z < TARGET_POS.z && newDartPos.z >= TARGET_POS.z);

  if (crossedPlane) {
    const denom = (newDartPos.z - prevDartPos.z) || 1e-6;
    const t = (TARGET_POS.z - prevDartPos.z) / denom; // 0~1之间，穿越发生在这一帧内的比例位置
    const hitX = prevDartPos.x + (newDartPos.x - prevDartPos.x) * t;
    const hitY = prevDartPos.y + (newDartPos.y - prevDartPos.y) * t;
    const dist = Math.hypot(hitX - TARGET_POS.x, hitY - TARGET_POS.y);
    resolveThrow(scoreForDistance(dist), { x: hitX, y: hitY, dist });
    return;
  }

  // ---- 兜底：落地或超时都算脱靶，避免飞镖飞出视野后状态机卡死 ----
  // 这种情况飞镖根本没穿过靶平面，没有真实碰撞点可标记，distance显示"未穿越靶面"
  if (dart.position.y <= 0 || flightTime > MAX_FLIGHT_TIME) {
    resolveThrow(0, null);
  }
}

// ---------- 收集进度持久化：localStorage只存卡牌ID，文案本身写死在上面 ----------
const CARD_STORAGE_KEY = 'qm-vr-demo-dart-cambridge-cards-v1';
function loadCollectedCardIds() {
  try {
    const raw = localStorage.getItem(CARD_STORAGE_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    return new Set(Array.isArray(arr) ? arr : []);
  } catch (e) {
    console.warn('[card] 读取localStorage失败，视为从空进度开始', e);
    return new Set();
  }
}
function saveCollectedCardIds() {
  try {
    localStorage.setItem(CARD_STORAGE_KEY, JSON.stringify([...collectedCardIds]));
  } catch (e) {
    console.warn('[card] 写入localStorage失败(可能是隐私模式/存储已满)，本次收集不会跨会话保留', e);
  }
}

// 关卡完成时调用的唯一对接点：只读currentLevel，不读写关卡计分/生命值/
// 碰撞检测的任何状态。找不到对应区域池、或该区域已经全部收集完毕时
// 都直接返回null，调用方(onLevelComplete)据此决定要不要弹解锁提示。
function unlockRandomCardForLevel(levelIndex) {
  const regionKey = LEVEL_TO_CARD_REGION[levelIndex];
  const region = regionKey && CARD_REGIONS[regionKey];
  if (!region) return null;
  const uncollected = region.cards.filter((c) => !collectedCardIds.has(c.id));
  if (uncollected.length === 0) return null; // 该区域已经集齐，本次通关不再解锁新卡
  const card = uncollected[Math.floor(Math.random() * uncollected.length)];
  collectedCardIds.add(card.id);
  saveCollectedCardIds();
  return card;
}

function notifyLevelCompleted(levelIndex) {
  const card = unlockRandomCardForLevel(levelIndex);
  if (card) showCardUnlockToast(card);

// 2026-07-11第十四轮：真机反馈"获得新卡牌"完全没有仪式感，静默出现。参考
// 红白机式"获得道具"的经典反馈组合，补齐三件套：闪光+弹出旋转动画+专属
// 音效。三者都复用已有的基础设施(triggerFlash/playTone)，不引入新的
// 渲染管线或音频素材。
function playCardUnlockSound() {
  // 清脆的"叮！"双音，刻意跟过关音效(playLevelCompleteSound，5音上扬琶音，
  // 听感更像"演奏一段旋律")区分开——这里只是短促的两个高音，前一个亮
  // (sine)、后一个带一点泛音尾巴(triangle)，更接近"叮~"这种即时道具反馈
  // 的听感，而不是"完成一件大事"的听感。
  playTone({ freq: 1568, duration: 0.16, type: 'sine', gain: 0.3 });   // G6
  setTimeout(() => playTone({ freq: 2093, duration: 0.24, type: 'triangle', gain: 0.22 }), 55); // C7，制造"叮~"的延音尾巴
}

function showCardUnlockToast(card) {
  drawCardToast(card);
  cardToastMesh.visible = true;
  cardToastStartTime = performance.now();
  triggerFlash(0xffd23f, 260); // 局部/全屏金色闪光，比较短促，只做"叮"的视觉重音，不喧宾夺主
  playCardUnlockSound();
}

function updateCardToast(now) {
  if (!cardToastMesh.visible) return;
  const age = now - cardToastStartTime;
  if (age > CARD_TOAST_LIFETIME) {
    cardToastMesh.visible = false;
    cardToastMesh.rotation.z = 0;
    return;
  }

  // 弹出动画：前200ms做"从小到大+轻微旋转"的亮相(scale从0快速overshoot到
  // 1.08再回落到1，rotation.z从一个小角度快速转正到0)，之后保持正常大小，
  // 最后收尾淡出——跟comboBurst同一路数的弹出感，这次额外加了旋转分量，
  // 呼应用户"伴随轻微旋转"的要求。
  const POP_DURATION = 260;
  let scale, rotZ;
  if (age < POP_DURATION) {
    const t = age / POP_DURATION;
    const eased = Math.sin(t * Math.PI * 0.5); // 0→1的缓动，避免线性显得生硬
    scale = eased * 1.08 - Math.sin(t * Math.PI) * 0.08; // 轻微overshoot再回落到1附近
    rotZ = Math.sin(t * Math.PI * 3) * 0.22 * (1 - t); // 衰减振荡，从摆动逐渐收敛到0，不是生硬的角度跳变
  } else {
    scale = 1;
    rotZ = 0;
  }
  cardToastMesh.scale.set(scale, scale, 1);
  cardToastMesh.rotation.z = rotZ;

  let opacity;
  if (age < 200) opacity = age / 200;
  else if (age < CARD_TOAST_LIFETIME - 500) opacity = 1;
  else opacity = Math.max(0, (CARD_TOAST_LIFETIME - age) / 500);
  cardToastMesh.material.opacity = opacity;
}

function controllerHitsMesh(controller, mesh) {
  controller.updateWorldMatrix(true, false);
  selectRayOrigin.setFromMatrixPosition(controller.matrixWorld);
  selectRayDir.set(0, 0, -1).transformDirection(controller.matrixWorld);
  selectRaycaster.set(selectRayOrigin, selectRayDir);
  return selectRaycaster.intersectObject(mesh, false).length > 0;
}

// 面板是camera子物体(不是像血量/退出牌那样的scene世界坐标物体)，本地z

// K = 新距离5.5 / 旧距离0.62 ≈ 8.871，几何尺寸按同一倍数放大
// (0.75x0.542 -> 6.653x4.808)，canvas分辨率(720x520)不变。

// 简单的按字符宽度换行：中英文混排时逐字符量测比按空格分词更可靠
// （中文没有空格），性能上完全够用——卡牌文字最多也就一两百字。
function wrapCardText(ctx, text, maxWidth) {
  const lines = [];
  let line = '';
  for (const ch of text) {
    const test = line + ch;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = ch;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

// 2026-07-11第十四轮：卡牌视觉重新设计，参考狼人杀/三国杀这类桌游卡牌
// 的典型结构——装饰性边框(双层)+角落花纹、顶部标题栏、中间图标/主图区、
// 底部描述文字区，取代之前"标题+正文混排的纯文本块"。单张卡牌的绘制
// 独立成一个函数，方便按区域主题(CARD_REGION_THEME)套不同配色，也方便
// 复用于收集/未收集两种状态。
function drawCardSlot(ctx, card, theme, region, collected, x, y, w, h) {
  const pad = 8;

  // 背景：从深到更深的竖直渐变，避免纯色块的廉价感
  const grad = ctx.createLinearGradient(0, y, 0, y + h);
  grad.addColorStop(0, theme.bgTop);
  grad.addColorStop(1, theme.bgBottom);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, 12);
  ctx.fill();

  // 双层装饰边框：外层粗描边+内层细描边，中间留一点间隙，比单层纯色框
  // 更有"卡牌"的精致感
  ctx.strokeStyle = theme.border;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.roundRect(x + 2, y + 2, w - 4, h - 4, 11);
  ctx.stroke();
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.7;
  ctx.beginPath();
  ctx.roundRect(x + 7, y + 7, w - 14, h - 14, 8);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // 四角装饰花纹：简单的"L"形折线，呼应桌游卡牌常见的角落装饰
  const cornerLen = 14;
  ctx.strokeStyle = theme.accent;
  ctx.lineWidth = 2;
  for (const [cx, cy, dx, dy] of [
    [x + 10, y + 10, 1, 1], [x + w - 10, y + 10, -1, 1],
    [x + 10, y + h - 10, 1, -1], [x + w - 10, y + h - 10, -1, -1],
  ]) {
    ctx.beginPath();
    ctx.moveTo(cx + dx * cornerLen, cy);
    ctx.lineTo(cx, cy);
    ctx.lineTo(cx, cy + dy * cornerLen);
    ctx.stroke();
  }

  // 顶部标题栏：单独的色块条，标题文字居中
  const titleBarH = 30;
  ctx.fillStyle = theme.titleBar;
  ctx.beginPath();
  ctx.roundRect(x + pad, y + pad, w - pad * 2, titleBarH, 6);
  ctx.fill();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 20px sans-serif';
  ctx.fillStyle = collected ? theme.titleText : '#8a8a82';
  ctx.fillText(collected ? card.title : '？ 神秘卡牌（尚未收集）', x + w / 2, y + pad + titleBarH / 2 + 1);

  // 中间图标/主图区：一个装饰性圆形徽记，收集了显示区域首字+主题色，
  // 未收集显示灰色剪影+"？"，不泄露内容——没有真实插画素材，用几何
  // 图形拼出"这里是主图区"的视觉存在感，而不是空着或者直接跳过这个分区
  const iconZoneY = y + pad + titleBarH + 6;
  const iconZoneH = 46;
  const iconCx = x + w / 2, iconCy = iconZoneY + iconZoneH / 2, iconR = 20;
  ctx.beginPath();
  ctx.arc(iconCx, iconCy, iconR, 0, Math.PI * 2);
  ctx.fillStyle = collected ? theme.titleBar : 'rgba(80,80,76,0.4)';
  ctx.fill();
  ctx.strokeStyle = collected ? theme.accent : '#6a6a62';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(iconCx, iconCy, iconR - 6, 0, Math.PI * 2);
  ctx.strokeStyle = collected ? theme.accent : '#5a5a54';
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.6;
  ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.font = 'bold 22px sans-serif';
  ctx.fillStyle = collected ? theme.accent : '#8a8a82';
  ctx.fillText(collected ? region.name[0] : '？', iconCx, iconCy + 1);

  // 底部描述文字区
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.font = '17px sans-serif';
  ctx.fillStyle = collected ? theme.bodyText : '#6a675e';
  const bodyText = collected ? card.text : '通关这一关，有机会随机解锁这张卡牌的完整内容。';
  const textTop = iconZoneY + iconZoneH + 20;
  const lines = wrapCardText(ctx, bodyText, w - pad * 2 - 12);
  let ty = textTop;
  const maxTy = y + h - 10;
  for (const line of lines) {
    if (ty > maxTy) break; // 保底：真的超出这张卡的高度就不再画，靠上面的clip兜底避免溢出到卡外
    ctx.fillText(line, x + pad + 6, ty);
    ty += 21;
  }
}

function drawCardBookPanel() {
  const ctx = cardBookCtx;
  const W = 720, H = 520;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(8, 7, 4, 0.94)';
  ctx.beginPath();
  ctx.roundRect(0, 0, W, H, 20);
  ctx.fill();
  ctx.strokeStyle = '#ffcc66';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.roundRect(4, 4, W - 8, H - 8, 18);
  ctx.stroke();

  const pageInfo = CARD_BOOK_PAGES[cardBookPageIndex];
  const region = pageInfo.region;
  const theme = CARD_REGION_THEME[pageInfo.regionKey];
  const subLabel = pageInfo.subTotal > 1 ? `（区域内第${pageInfo.subIndex + 1}/${pageInfo.subTotal}页）` : '';

  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = '#ffe9c2';
  ctx.font = 'bold 30px sans-serif';
  ctx.fillText(`光子的剑桥笔记 · ${region.name}`, W / 2, 40);
  ctx.font = '16px sans-serif';
  ctx.fillStyle = '#9db4cc';
  ctx.fillText(`第 ${cardBookPageIndex + 1}/${CARD_BOOK_PAGES.length} 页${subLabel} · 对应第${region.levelIndex + 1}关`, W / 2, 66);

  // 2026-07-11第十三轮加的裁剪区域保底这一轮继续保留——卡牌重新设计成
  // 带装饰边框的分区布局后，每张卡自己内部也有裁剪(drawCardSlot里超出
  // 高度就不再画)，这一层是外层双保险，防止任何单张卡的溢出波及到整个
  // 内容区域之外。
  ctx.save();
  ctx.beginPath();
  ctx.roundRect(4, 82, W - 8, H - 82 - 30, 14);
  ctx.clip();

  const contentTop = 92;
  const contentBottom = H - 34;
  const slotGap = 12;
  const slotH = (contentBottom - contentTop - slotGap * (pageInfo.cards.length - 1)) / pageInfo.cards.length;
  let slotY = contentTop;
  for (const card of pageInfo.cards) {
    const collected = collectedCardIds.has(card.id);
    drawCardSlot(ctx, card, theme, region, collected, 16, slotY, W - 32, slotH);
    slotY += slotH + slotGap;
  }
  ctx.restore();

  ctx.textAlign = 'center';
  ctx.font = '15px sans-serif';
  ctx.fillStyle = '#6a8aa8';
  ctx.fillText('瞄准"卡册"图标+按抓握键：翻下一页，翻到最后一页后关闭', W / 2, H - 12);

  cardBookTexture.needsUpdate = true;
}

// 2026-07-11第十三轮：开关+翻页合并成同一个按钮的连续点击(见
// cardBookIconMesh上方的说明)，不再需要单独的"下一页"图标/位置。
function openCardBookAtFirstPage() {
  cardBookOpen = true;
  cardBookPageIndex = 0;
  cardBookMesh.visible = true;
  drawCardBookIcon(false);
  drawCardBookPanel();
}

function advanceOrCloseCardBook() {
  if (cardBookPageIndex >= CARD_BOOK_PAGES.length - 1) {
    cardBookOpen = false;
    cardBookMesh.visible = false;
    drawCardBookIcon(false);
  } else {
    cardBookPageIndex += 1;
    drawCardBookPanel();
  }
}

// 每帧更新hover高亮 + 消费本帧的squeeze事件。跟updateItemSelectPanel()是
// 平级的两个"射线瞄准面板"系统，共用同一个selectRaycaster/pendingItemSqueeze，
// 靠"谁先从队列里取走controller"分先后：瞄准卡册图标的squeeze会在这里被
// 直接消费掉，不再传给下面的物品选择面板逻辑；卡册打开期间，其余没瞄准
// 卡册图标的squeeze也会被吞掉，不会误触道具切换。
function updateCardBookInteraction() {
  let bookHovered = false;
  for (const controller of [controller0, controller1]) {
    if (controllerHitsMesh(controller, cardBookIconMesh)) bookHovered = true;
  }
  drawCardBookIcon(bookHovered);

  if (pendingItemSqueeze.length === 0) return false;
  let consumed = false;
  const remaining = [];
  for (const controller of pendingItemSqueeze) {
    if (controllerHitsMesh(controller, cardBookIconMesh)) {
      if (cardBookOpen) advanceOrCloseCardBook();
      else openCardBookAtFirstPage();
      consumed = true;
    } else if (cardBookOpen) {
      // 卡册打开时，其余的squeeze(没瞄准卡册图标)直接吞掉，不传给
      // 物品选择面板，避免在翻阅卡牌时意外切换了手上的投掷物
      consumed = true;
    } else {
      remaining.push(controller); // 卡册关闭、也没瞄准卡册按钮，交还给物品选择面板走原来的逻辑
    }
  }
  pendingItemSqueeze = remaining;
  return consumed;
}

// ---------- FPS统计 + 主渲染循环 ----------
let frameCount = 0;
let lastTime = performance.now();
let lastFrameTime = performance.now();
let currentFps = 0;
const statsEl = document.getElementById('stats');
let idleBob = 0;

function animate() {
  const now = performance.now();
  const dt = Math.min((now - lastFrameTime) / 1000, 0.05); // clamp，避免掉帧瞬间dt过大导致物理积分跳变
  lastFrameTime = now;

  const inXR = renderer.xr.isPresenting;

  if (inXR) {
    updateAnalogGrabInput(); // 每帧轮询模拟量，比只靠原生事件更灵敏
  }

  if (!inXR) {
    // ---- 桌面模式：没有手柄，只做静止预览，不模拟抓取投掷 ----
    dart.position.set(0.3, 1.3, -0.3);
    dart.rotation.set(0, Math.PI * 0.15, 0);
  } else if (dartState === STATE.FLYING) {
    updateFlying(dt);
  } else if (dartState === STATE.HELD) {
    // held：刚性跟随抓着它的那只手（不预设是哪只，谁抓的就跟谁）
    holderController.getWorldPosition(tmpControllerPos);
    holderController.getWorldQuaternion(tmpControllerQuat);
    tmpOffset.copy(GRAB_OFFSET).applyQuaternion(tmpControllerQuat);

    dart.position.copy(tmpControllerPos).add(tmpOffset);
    dart.quaternion.copy(tmpControllerQuat);

    // 记录的是controller本身的世界坐标+朝向（不是飞镖偏移后的位置），
    // 释放时要分别用这两组数据算线性速度和角速度，见releaseDart()
    posHistory.push({ p: tmpControllerPos.clone(), q: tmpControllerQuat.clone(), t: now });
    if (posHistory.length > HISTORY_LEN) posHistory.shift();
  } else {
    // idle：停在场景中性位置，带一点轻微浮动，暗示"还没抓稳"，
    // 不跟随任何手柄，双手都能伸过来抓取
    idleBob += dt * 2.2;
    dart.position.set(IDLE_POS.x, IDLE_POS.y + Math.sin(idleBob) * 0.01, IDLE_POS.z);
    dart.quaternion.identity();

    // 预抓取发光提示：扳机压力过了PRE_GRAB_THRESHOLD但还没到GRAB_THRESHOLD时，
    // 让当前物体的主材质做一个呼吸感的高亮，告诉用户"已经在可抓取范围了，继续按"。
    // currentHintMat跟着currentItemType变化，三种物体通用同一套逻辑。
    if (hintOn) {
      currentHintMat.emissiveIntensity = 0.9 + Math.sin(now / 120) * 0.6;
    } else {
      currentHintMat.emissiveIntensity = BASE_HINT_EMISSIVE;
    }
  }

  updateHitMarkers(now);
  updateRatingTexts(now);
  updateComboBurst(now);
  updateCardToast(now);
  updateSparks(dt); // 不管在不在飞行，已经存在的火星粒子都要继续衰减/淡出
  updateSplatEffects(dt);
  updateAxeImpacts(now);
  updateTargetShake(dt);
  updateFlash(now);
  updateWipe(now);
  updateGhostHand(now);
  updateEnemy(dt);
  updateProtectedFlinch(dt);

  // 面板始终朝向摄像机（billboard）
  panel.quaternion.copy(camera.quaternion);

  exitButton.update();
  // 卡册的射线瞄准+squeeze要先于物品选择面板处理，命中卡册相关图标的
  // squeeze会被直接消费掉(见updateCardBookInteraction的说明)，不会再传
  // 给下面的updateItemSelectPanel()，两者靠"谁先从pendingItemSqueeze里
  // 拿走controller"分先后，不需要额外的模式切换标记。
  updateCardBookInteraction();
  updateItemSelectPanel();

  renderer.render(scene, camera);

  frameCount++;
  if (now - lastTime >= 500) {
    currentFps = Math.round((frameCount * 1000) / (now - lastTime));
    frameCount = 0;
    lastTime = now;

    statsEl.innerHTML = `FPS: ${currentFps}<br/>累计得分: ${totalScore} · 已投掷: ${throwCount}` +
      (currentFps < 60 ? '<br/><span class="warn">⚠ 低于60fps</span>' : '');
    drawPanel(currentFps);
  }
}

renderer.setAnimationLoop(animate);
</script>
