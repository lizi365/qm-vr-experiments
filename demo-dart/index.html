<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quantum VR — Demo Dart · 抓取投掷交互测试</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #05070c; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  #info {
    position: fixed; top: 16px; left: 16px;
    color: #cfe8ff; font-size: 13px; line-height: 1.7;
    opacity: 0.9; z-index: 10; pointer-events: none;
    max-width: 340px;
  }
  #info b { color: #7fd4ff; }
  #info .warn { color: #ffb37f; }
  #stats {
    position: fixed; top: 16px; right: 16px;
    color: #7fd4ff; font-size: 13px;
    font-variant-numeric: tabular-nums;
    z-index: 10; text-align: right; line-height: 1.7;
  }
  #stats .warn { color: #ff9f7f; }
  button { z-index: 20; }
</style>
</head>
<body>

<div id="info">
  <b>Demo Dart · 三关小游戏（飞镖打靶 → 狐狸抓兔子 → 老鼠偷蛋）</b><br/>
  VR模式：按住手柄<b>扳机键(trigger)</b>抓住投掷物，甩动手柄后松开投掷<br/>
  左下方面板用<b>抓握键</b>切换飞镖/番茄/斧头，右下方面板<b>抓握键</b>退出VR<br/>
  视野上方是生命值(❤)和关卡进度条，靶心10分往外依次8/6/4/2分，连续命中6分以上有连击加成<br/>
  <span class="warn">桌面模式仅供预览，无法模拟抓取投掷手感；按L键可调试性地扣一条命</span>
</div>
<div id="stats">FPS: --</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.164.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.164.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { VRButton } from 'three/addons/webxr/VRButton.js';
import { createXRExitButton } from '../shared/xrExitButton.js';

// ---------- 基础场景：昏暗森林氛围 ----------
// 2026-07-10场景改造：从深空蓝黑改成深绿偏黑的森林氛围，雾色跟背景色
// 一致，营造视线受限的林间纵深感。这一段只改颜色/光照/地面/装饰物，
// 不碰下面的抓取/投掷/碰撞检测逻辑。
const FOREST_BG = 0x070a06;
const scene = new THREE.Scene();
scene.background = new THREE.Color(FOREST_BG);
scene.fog = new THREE.Fog(FOREST_BG, 2, 9); // 比之前(3,14)更近更浓，视线受限的森林感

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 50);
camera.position.set(0, 1.6, 2.2);
// camera必须是scene的子节点：Three.js的render(scene, camera)只从scene开始
// 递归遍历渲染列表（见WebGLRenderer.projectObject），camera.add(mesh)挂出来的
// 所有HUD（生命值/进度条/提示文字/道具选择面板/退出VR面板/转场遮罩/结算面板，
// 共8个）如果camera本身不在scene里，就永远不会被遍历到，完全不会渲染——
// 无论桌面预览还是真机，且不会报错，非常隐蔽。2026-07-10真机测试发现进度条
// "完全看不见"，用Playwright加调试钩子实测scene.traverse()确认camera不在
// 场景图里，加上这一行后所有相机挂载HUD同时恢复可见，才定位到这是唯一根因。
scene.add(camera);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
const vrButton = VRButton.createButton(renderer);
document.body.appendChild(vrButton);

// 灯光从冷色调科幻蓝(0x445577/0x7fd4ff)换成偏暗的林间绿+透过树冠的暖黄，
// 强度也调低，配合浓雾维持"昏暗"的基调
const ambient = new THREE.AmbientLight(0x2a3a26, 0.55);
scene.add(ambient);
const point = new THREE.PointLight(0xffcf8a, 1.8, 10);
point.position.set(1, 3, -0.5); // 挪高一点，模拟从树冠缝隙洒下来的光
scene.add(point);

// ---------- 森林地面：程序化Canvas噪声贴图，深褐/深绿斑驳落叶苔藓质感 ----------
// 不追求真实感，用随机色块+颗粒噪点堆出"斑驳"的印象即可
const groundCanvas = document.createElement('canvas');
groundCanvas.width = 512;
groundCanvas.height = 512;
const gctx = groundCanvas.getContext('2d');
gctx.fillStyle = '#1c150e'; // 基底：深褐土色
gctx.fillRect(0, 0, 512, 512);
// 大块的深绿苔藓斑块
for (let i = 0; i < 40; i++) {
  gctx.fillStyle = `rgba(${20 + Math.random()*20}, ${40 + Math.random()*30}, ${15 + Math.random()*15}, ${0.3 + Math.random()*0.4})`;
  const r = 20 + Math.random() * 60;
  gctx.beginPath();
  gctx.arc(Math.random() * 512, Math.random() * 512, r, 0, Math.PI * 2);
  gctx.fill();
}
// 细小的落叶颗粒噪点
for (let i = 0; i < 900; i++) {
  const shade = Math.random();
  gctx.fillStyle = shade > 0.5
    ? `rgba(${60 + Math.random()*40}, ${35 + Math.random()*20}, ${10 + Math.random()*10}, 0.6)`
    : `rgba(${15 + Math.random()*15}, ${25 + Math.random()*15}, ${10 + Math.random()*10}, 0.6)`;
  gctx.fillRect(Math.random() * 512, Math.random() * 512, 2 + Math.random() * 3, 2 + Math.random() * 3);
}
const groundTexture = new THREE.CanvasTexture(groundCanvas);
groundTexture.wrapS = THREE.RepeatWrapping;
groundTexture.wrapT = THREE.RepeatWrapping;
groundTexture.repeat.set(4, 4); // 平铺几次，避免地面太大时看出贴图重复的单调感太明显

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(20, 20),
  new THREE.MeshStandardMaterial({ map: groundTexture, roughness: 0.95, metalness: 0 })
);
ground.rotation.x = -Math.PI / 2; // Plane默认竖直，转平铺地
scene.add(ground);

// ---------- 树干剪影：简化圆柱(树干)+圆锥(树冠)，只做空间氛围暗示 ----------
// 位置刻意避开靶(z=-2.5附近)和飞行轨迹(大致沿x=0走廊)，放在两侧和更远处，
// 数量控制在5棵，几何体segment数很低，对帧率基本没有影响
function buildTree(x, z, scale) {
  const group = new THREE.Group();
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x1a1410, roughness: 1 });
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.09, 1.6, 6), trunkMat);
  trunk.position.y = 0.8;
  group.add(trunk);

  const canopyMat = new THREE.MeshStandardMaterial({ color: 0x0f1a0d, roughness: 1 });
  for (let i = 0; i < 3; i++) {
    const canopy = new THREE.Mesh(new THREE.ConeGeometry(0.9 - i * 0.18, 1.1, 7), canopyMat);
    canopy.position.y = 1.6 + i * 0.7;
    group.add(canopy);
  }

  group.position.set(x, 0, z);
  group.scale.setScalar(scale);
  return group;
}
const TREE_LAYOUT = [
  [-2.6, -1.5, 1.1], [2.8, -2.0, 1.3], [-3.2, -4.0, 1.5],
  [3.4, -4.5, 1.2], [-1.8, -6.0, 1.6],
];
// 存进数组是为了后面切关卡时能整体隐藏/显示——农场关(第二关)和老鼠关(第三关)
// 不需要森林树影，之前这里是即用即弃的写法，现在需要保留引用
const forestTrees = TREE_LAYOUT.map(([x, z, s]) => {
  const t = buildTree(x, z, s);
  scene.add(t);
  return t;
});

// ---------- 飞镖靶：Canvas贴图画同心圆环，贴在一个Plane上 ----------
const TARGET_POS = new THREE.Vector3(0, 1.5, -2.5);
const TARGET_RADIUS = 0.5; // 靶面半径（米），跟canvas贴图的圆环比例对应

// 计分环半径比例（相对TARGET_RADIUS的分数），由内到外：10/8/6/4/2分，超出即脱靶
const RINGS = [
  { frac: 0.08, score: 10, color: '#e8c94a' }, // 靶心：金色
  { frac: 0.22, score: 8,  color: '#c23b3b' }, // 红
  { frac: 0.42, score: 6,  color: '#e8dcc0' }, // 米白
  { frac: 0.65, score: 4,  color: '#2c5c3a' }, // 绿
  { frac: 1.0,  score: 2,  color: '#e8dcc0' }, // 米白（最外圈）
];

function scoreForDistance(dist) {
  const t = dist / TARGET_RADIUS;
  for (const ring of RINGS) {
    if (t <= ring.frac) return ring.score;
  }
  return 0; // 脱靶
}

const targetCanvas = document.createElement('canvas');
targetCanvas.width = 512;
targetCanvas.height = 512;
const tctx = targetCanvas.getContext('2d');
// 由外到内依次画实心圆，后画的覆盖前面的，天然形成同心环
const cx = 256, cy = 256, pxPerMeter = 256 / TARGET_RADIUS;
for (let i = RINGS.length - 1; i >= 0; i--) {
  tctx.beginPath();
  tctx.arc(cx, cy, RINGS[i].frac * TARGET_RADIUS * pxPerMeter, 0, Math.PI * 2);
  tctx.fillStyle = RINGS[i].color;
  tctx.fill();
}
// 环之间加一圈细描边，方便视觉分辨
tctx.strokeStyle = 'rgba(0,0,0,0.35)';
tctx.lineWidth = 2;
for (const ring of RINGS) {
  tctx.beginPath();
  tctx.arc(cx, cy, ring.frac * TARGET_RADIUS * pxPerMeter, 0, Math.PI * 2);
  tctx.stroke();
}
const targetTexture = new THREE.CanvasTexture(targetCanvas);

const targetMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(TARGET_RADIUS * 2, TARGET_RADIUS * 2),
  new THREE.MeshBasicMaterial({ map: targetTexture, side: THREE.FrontSide })
);
targetMesh.position.copy(TARGET_POS);
scene.add(targetMesh);
// 靶后面加一块深色背板，纯粹是为了避免穿模时露出场景背景，增加实体感
const backboard = new THREE.Mesh(
  new THREE.CircleGeometry(TARGET_RADIUS * 1.08, 32),
  new THREE.MeshBasicMaterial({ color: 0x1a1410 })
);
backboard.position.copy(TARGET_POS).add(new THREE.Vector3(0, 0, -0.02));
scene.add(backboard);

// ---------- 三种可选投掷物：飞镖(保留原样)/番茄/斧头 ----------
// 每个build函数返回 { group, hintMat }：group是Object3D，hintMat是"预抓取
// 发光提示"要调emissiveIntensity的那个材质。抓取判定/速度计算/碰撞检测
// 完全不关心具体是哪种物体——那些代码只操作外层的`dart`变量（当前生效的
// Object3D引用）和`currentHintMat`，不需要知道也不需要修改。
const BASE_HINT_EMISSIVE = 0.3;

// 飞镖：圆锥(镖尖) + 圆柱(镖身)，本地-Z方向为"前进方向"。跟之前完全一样，
// 一个字符都没改，只是从"直接建到外层变量"改成了"包一层返回值"。
function buildDart() {
  const group = new THREE.Group();

  const tipGeo = new THREE.ConeGeometry(0.012, 0.05, 8);
  tipGeo.rotateX(-Math.PI / 2); // 让圆锥尖端指向本地 -Z（默认指向+Y）
  const tipMat = new THREE.MeshStandardMaterial({ color: 0xd8d8e0, metalness: 0.7, roughness: 0.3 });
  const tip = new THREE.Mesh(tipGeo, tipMat);
  tip.position.z = -0.025;
  group.add(tip);

  const shaftGeo = new THREE.CylinderGeometry(0.009, 0.009, 0.09, 8);
  shaftGeo.rotateX(-Math.PI / 2);
  const shaftMat = new THREE.MeshStandardMaterial({
    color: 0xff6b4a, metalness: 0.2, roughness: 0.5,
    emissive: 0x4a1c0a, emissiveIntensity: BASE_HINT_EMISSIVE,
  });
  const shaft = new THREE.Mesh(shaftGeo, shaftMat);
  shaft.position.z = 0.045;
  group.add(shaft);

  return { group, hintMat: shaftMat };
}

// 番茄：一个球体，轻微不均匀缩放模拟"圆润但不完美"的手工感，不追求写实
function buildTomato() {
  const group = new THREE.Group();
  const bodyMat = new THREE.MeshStandardMaterial({
    color: 0xcc2a1e, roughness: 0.55, metalness: 0.05,
    emissive: 0x4a0a06, emissiveIntensity: BASE_HINT_EMISSIVE,
  });
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.045, 14, 12), bodyMat);
  body.scale.set(1, 0.92, 1.06); // 轻微挤压，别做成完美的球
  group.add(body);

  // 蒂头：一小截深绿圆柱+一撮小圆锥叶片，纯装饰，几何量极小
  const stemMat = new THREE.MeshStandardMaterial({ color: 0x2a4a1c, roughness: 0.8 });
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.006, 0.008, 0.02, 6), stemMat);
  stem.position.y = 0.045;
  group.add(stem);

  return { group, hintMat: bodyMat };
}

// 斧头：大晶体(斧刃) + 垂直木柄，经典斧头造型
// 2026-07-11第十三轮：真机反馈"顶端一大一小两个不规则晶体太复杂"。这次
// 简化——去掉之前补充的小崩裂碎块(chip)，只保留较大的主石块作为刃部；
// 木柄从"沿前进方向水平安装"改成从大晶体下方垂直(90度)安装，拼出
// "石斧头+垂直木柄"的经典轮廓(不再是原来"手柄+斧头都朝前"的标枪式
// 造型)。材质/配色(灰褐色粗粝质感、flatShading棱角)完全不动，
// 只调整两块几何体的相对朝向。
function buildAxe() {
  const group = new THREE.Group();

  // 2026-07-11第十一轮定下的石头材质，本轮未改动：灰褐色、roughness
  // 接近1、flatShading让棱角分明，呼应"打制石器"的粗糙感。
  const stoneMat = new THREE.MeshStandardMaterial({
    color: 0x6e675c, roughness: 0.95, flatShading: true,
    emissive: 0x3a3830, emissiveIntensity: BASE_HINT_EMISSIVE,
  });

  // 唯一保留的主体石块：还是用IcosahedronGeometry(20面体)做底形，棱角
  // 分明的不规则块状，比压扁的圆锥更容易读成"一块石头"。拉长+压扁做出
  // 楔形轮廓，位置/朝向沿用之前效果良好的数值，只是不再需要跟chip拼接。
  const mainGeo = new THREE.IcosahedronGeometry(0.048, 0);
  mainGeo.scale(1.5, 0.62, 0.55);
  mainGeo.translate(0.012, 0, 0);
  const mainStone = new THREE.Mesh(mainGeo, stoneMat);
  mainStone.position.set(0.028, 0.012, -0.075);
  mainStone.rotation.z = -0.16;
  mainStone.rotation.y = 0.18;
  group.add(mainStone);

  // 木柄：CylinderGeometry默认长轴就是本地Y(竖直)，不再像之前那样
  // rotateX(-Math.PI/2)转成水平前伸——保持默认竖直朝向，从石块正下方
  // 垂直挂下来，形成"石斧头在上、木柄垂直在下"的经典斧头剪影。
  const handleMat = new THREE.MeshStandardMaterial({ color: 0x5a3a20, roughness: 0.9 });
  const handleGeo = new THREE.CylinderGeometry(0.008, 0.008, 0.15, 6);
  const handle = new THREE.Mesh(handleGeo, handleMat);
  handle.position.set(mainStone.position.x, mainStone.position.y - 0.09, mainStone.position.z);
  group.add(handle);

  // 缠绳细节：套在垂直木柄顶部、贴着石斧头根部的位置，暗示绳索捆绑固定
  // 石斧头的原始工艺。手柄现在竖直(本地Y轴)，圆环默认法线沿本地Z，需要
  // 绕X轴转90度让圆环平躺、套住竖直的手柄轴向。
  const bindingMat = new THREE.MeshStandardMaterial({ color: 0x3a2a18, roughness: 0.9 });
  const binding = new THREE.Mesh(new THREE.TorusGeometry(0.014, 0.005, 6, 10), bindingMat);
  binding.rotation.x = Math.PI / 2;
  binding.position.set(mainStone.position.x, mainStone.position.y - 0.02, mainStone.position.z);
  group.add(binding);

  return { group, hintMat: stoneMat };
}

// ---------- 投掷物类型配置：外观/尾焰颜色/命中反馈都从这里查 ----------
const ITEM_ORDER = ['dart', 'tomato', 'axe'];
// 2026-07-11第十三轮：真机反馈"只有飞镖有拖尾特效，番茄/斧头没看到"。
// 用Playwright实测(round13_trail_check.js：切到三关分别模拟飞行20帧，
// 直接读sparkActive数组)确认拖尾粒子生成逻辑本身是通用的、三种投掷物
// 都在正常生成粒子(tomato/axe都能填满MAX_SPARKS=80的粒子池上限，跟dart
// 完全一样)，不是"缺失复用"。真正能在代码里站得住脚的可疑点是斧头的
// 尾焰颜色0x99aabb(浅蓝灰)跟第三关背景色0x141a2e(深藏青)色相太接近，
// 叠加AdditiveBlending之后視覺上几乎融进背景，比飞镖(暖橙对深绿森林)、
// 番茄(红对亮绿农场)的对比度低很多——这一点没有真机条件复验，只是
// 代码走查能定位到的一个合理成因，换成暖色调的"火石打出的星火"配色
// (0xffcc66，主题上也贴合"石斧敲击"的意象)，跟深藏青背景形成明显对比。
// tomato/dart的颜色对比度本身足够，未改动。
const ITEM_TYPES = {
  dart:   { label: '飞镖', trailColor: 0xff8844 },
  tomato: { label: '番茄', trailColor: 0xff4444 },
  axe:    { label: '斧头', trailColor: 0xffcc66 },
};

const itemGroups = {
  dart: buildDart(),
  tomato: buildTomato(),
  axe: buildAxe(),
};
for (const type of ITEM_ORDER) {
  itemGroups[type].group.visible = false;
  scene.add(itemGroups[type].group); // 三个都提前建好、加进场景，切换时只是切visible，不重复创建/销毁
}

let currentItemType = 'dart';
itemGroups.dart.group.visible = true;

// dart/currentHintMat是下面所有抓取/投掷/命中代码统一操作的"当前生效物体"
// 引用——用let而不是const，是因为切换类型时要重新指向另一个预建好的group，
// 除此之外，所有读写dart.position/dart.quaternion/currentHintMat.xxx的代码
// 一个字都不用改，它们本来就不知道也不需要知道具体是哪种物体。
let dart = itemGroups.dart.group;
let currentHintMat = itemGroups.dart.hintMat;
let currentTrailColor = ITEM_TYPES.dart.trailColor; // 尾焰粒子颜色，按当前类型走，spawnSpark()那边直接读这个

// ---------- 飞行尾焰/火星拖尾：Points粒子池，固定上限，不用GPU粒子系统 ----------
// 只在dartState===FLYING期间生成，读dartVelocity/dart.position（只读，不改
// 抓取/投掷/碰撞检测的任何逻辑），跟物理系统完全解耦。用对象池+固定大小
// 的BufferAttribute，每帧原地更新，不做每帧new/delete，成本可控。
const MAX_SPARKS = 80; // "几十个量级"，留够余量但不会太多
const sparkPositions = new Float32Array(MAX_SPARKS * 3);
const sparkColorsArr = new Float32Array(MAX_SPARKS * 3);
const sparkGeo = new THREE.BufferGeometry();
sparkGeo.setAttribute('position', new THREE.BufferAttribute(sparkPositions, 3));
sparkGeo.setAttribute('color', new THREE.BufferAttribute(sparkColorsArr, 3));

// 小圆点贴图（径向渐变），让粒子看起来是柔和的光点而不是硬边方块
const dotCanvas = document.createElement('canvas');
dotCanvas.width = 32;
dotCanvas.height = 32;
const dctx = dotCanvas.getContext('2d');
const grad = dctx.createRadialGradient(16, 16, 0, 16, 16, 16);
grad.addColorStop(0, 'rgba(255,255,255,1)');
grad.addColorStop(0.4, 'rgba(255,255,255,0.7)');
grad.addColorStop(1, 'rgba(255,255,255,0)');
dctx.fillStyle = grad;
dctx.fillRect(0, 0, 32, 32);
const dotTexture = new THREE.CanvasTexture(dotCanvas);

const sparkMat = new THREE.PointsMaterial({
  size: 0.035, sizeAttenuation: true, vertexColors: true,
  map: dotTexture, transparent: true, depthWrite: false,
  blending: THREE.AdditiveBlending, // 叠加混合，重叠的火星看起来更"发光"而不是糊成一片
});
const sparkPoints = new THREE.Points(sparkGeo, sparkMat);
scene.add(sparkPoints);

const sparkActive = new Array(MAX_SPARKS).fill(false);
const sparkVel = new Array(MAX_SPARKS).fill(null).map(() => new THREE.Vector3());
const sparkAge = new Float32Array(MAX_SPARKS);
const sparkLife = new Float32Array(MAX_SPARKS);
const sparkBaseColor = new Array(MAX_SPARKS).fill(null).map(() => new THREE.Color());
let sparkCursor = 0; // 循环分配槽位，旧粒子还没消失也会被新粒子顶替（池子满了的兜底行为，正常情况下不会撞上）
// currentTrailColor在上面"三种可选投掷物"那一段已经声明并初始化过了，
// switchItemType()切换类型时会更新它，spawnSpark()调用处直接读

const tmpSparkJitter = new THREE.Vector3();
function spawnSpark(position, backwardDir, speedFactor, colorHex) {
  const i = sparkCursor;
  sparkCursor = (sparkCursor + 1) % MAX_SPARKS;
  sparkActive[i] = true;
  sparkAge[i] = 0;
  // 2026-07-11第十四轮：从0.22~0.4秒延长到0.45~0.75秒(约1.8倍)——排查
  // "拖尾时灵时不灵"时发现，低速投掷的飞行时间长(0.5~0.67秒)但单个粒子
  // 存活时间短，很可能表现成"手边一小团光点"而不是"一条拖尾"，只有速度
  // 足够快、飞行距离拉开才会呈现出清晰的拖尾观感。延长存活时间让粒子在
  // 低速投掷时也能跟着飞行轨迹拉出更长的可见长度，不再依赖速度本身把
  // 轨迹"拉长"。
  sparkLife[i] = 0.45 + Math.random() * 0.3;

  tmpSparkJitter.set((Math.random() - 0.5) * 0.7, (Math.random() - 0.5) * 0.7, (Math.random() - 0.5) * 0.7);
  sparkVel[i].copy(backwardDir).multiplyScalar(0.4 + speedFactor * 1.3).add(tmpSparkJitter);
  sparkBaseColor[i].set(colorHex);

  sparkPositions[i * 3] = position.x;
  sparkPositions[i * 3 + 1] = position.y;
  sparkPositions[i * 3 + 2] = position.z;
}

function updateSparks(dt) {
  for (let i = 0; i < MAX_SPARKS; i++) {
    if (!sparkActive[i]) continue;
    sparkAge[i] += dt;
    if (sparkAge[i] >= sparkLife[i]) {
      sparkActive[i] = false;
      // 熄灭时把颜色清零，不然这个槽位在被下一次spawn复用之前会一直
      // 显示"卡住"的最后一帧亮点
      sparkColorsArr[i * 3] = 0;
      sparkColorsArr[i * 3 + 1] = 0;
      sparkColorsArr[i * 3 + 2] = 0;
      continue;
    }

    sparkVel[i].y -= 1.2 * dt; // 比真实重力(9.8)轻很多，火星飘得慢一点更好看，不是物理精确
    sparkVel[i].multiplyScalar(0.94); // 空气阻力衰减，让粒子逐渐减速而不是匀速飞太远
    sparkPositions[i * 3] += sparkVel[i].x * dt;
    sparkPositions[i * 3 + 1] += sparkVel[i].y * dt;
    sparkPositions[i * 3 + 2] += sparkVel[i].z * dt;

    const fade = 1 - sparkAge[i] / sparkLife[i]; // 用颜色亮度衰减模拟alpha淡出（配合加法混合，暗=透明）
    sparkColorsArr[i * 3] = sparkBaseColor[i].r * fade;
    sparkColorsArr[i * 3 + 1] = sparkBaseColor[i].g * fade;
    sparkColorsArr[i * 3 + 2] = sparkBaseColor[i].b * fade;
  }
  sparkGeo.attributes.position.needsUpdate = true;
  sparkGeo.attributes.color.needsUpdate = true;
}

// ---------- 音效：Web Audio API合成，不引入外部音频文件 ----------
// 排查记录（2026-07-10）：上一版实机测试完全没有声音，原因是AudioContext
// 的resume()只有在真正的"用户手势"调用栈里发起才会生效——之前唯一调用
// ensureAudio()的地方是grabDart()，而grabDart()同时被两条路径调用：
// 原生事件（当时是squeezestart，现在改成selectstart了，道理一样——这是
// 真实的用户手势）、和每帧轮询的updateAnalogGrabInput()（这只是渲染循环
// 里的普通函数调用，不算用户手势）。
// 因为轮询每帧都在跑，几乎总是比原生事件先摸到抓取阈值、抢先调用
// grabDart()——而grabDart()内部有状态守卫，抢到的那次执行完，原生事件
// 触发时状态已经不是IDLE了，直接return，playGrabSound()根本没机会在
// "真手势"的调用栈里跑。resume()在非手势上下文里静默失败、不报错，
// 现象就是"完全没有声音、控制台也没有报错"，跟猜测的一致。
//
// 修法：把第一次resume()尝试挪到"Enter VR"按钮的click事件里——这是唯一
// 100%保证是真实用户手势的时机，比任何抓取事件都更早、更可靠。
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    console.log('[audio] AudioContext created, initial state =', audioCtx.state);
  }
  if (audioCtx.state !== 'running') {
    audioCtx.resume().then(() => {
      console.log('[audio] resume() resolved, state =', audioCtx.state);
    }).catch((err) => {
      console.warn('[audio] resume() rejected', err);
    });
  }
  return audioCtx;
}

// "Enter VR"按钮的click是最可靠的真实用户手势来源，在这里第一次尝试
// resume，比等第一次抓取更早、更保险。
vrButton.addEventListener('click', () => {
  console.log('[audio] Enter VR clicked, attempting audio resume from a real user gesture');
  ensureAudio();
});

// 一段短促的音调，用振荡器+包络实现，type控制音色（sine柔和/triangle明亮/
// square更"哒"一点的打击感），freqEnd可选——传了就做一个音高滑动（用在抓取
// 音效上，做出"咔"一下降调的吸附感）。
function playTone({ freq, duration = 0.12, type = 'sine', gain = 0.25, freqEnd = null }) {
  const ctx = ensureAudio();
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime);
  if (freqEnd) {
    osc.frequency.exponentialRampToValueAtTime(freqEnd, ctx.currentTime + duration);
  }
  // 快速起振（8ms）避免咔哒声，然后指数衰减到接近静音，比线性衰减更接近
  // 真实打击音的"听感"
  g.gain.setValueAtTime(0, ctx.currentTime);
  g.gain.linearRampToValueAtTime(gain, ctx.currentTime + 0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
  osc.connect(g).connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + duration + 0.02);
}

// 一段随时间衰减的带通滤波白噪声，听感类似"一阵短促的欢呼/掌声"，
// 用在10环命中上跟主音调叠加，纯振荡器做不出这种质感，白噪声+滤波是
// 成本最低的近似方案，不需要引入真实音频素材。
function playNoiseBurst(duration = 0.4, gain = 0.16) {
  const ctx = ensureAudio();
  const bufferSize = Math.floor(ctx.sampleRate * duration);
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize); // 随时间线性衰减
  }
  const src = ctx.createBufferSource();
  src.buffer = buffer;
  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 2500;
  filter.Q.value = 0.6;
  const g = ctx.createGain();
  g.gain.value = gain;
  src.connect(filter).connect(g).connect(ctx.destination);
  src.start();
}

function playGrabSound() {
  // 短促降调的方波"咔"声，模拟抓取吸附的手感反馈
  playTone({ freq: 720, freqEnd: 480, duration: 0.05, type: 'square', gain: 0.18 });
}

// 环数越高音调越亮（sine→triangle音色也更清脆），最外圈是低沉闷响，
// 10环额外叠加一段欢呼音效，呼应视觉上的"EXCELLENT!"反馈
const HIT_SOUND_BY_SCORE = {
  10: () => { playTone({ freq: 880, duration: 0.18, type: 'triangle', gain: 0.3 }); playNoiseBurst(0.4, 0.16); },
  8: () => playTone({ freq: 600, duration: 0.16, type: 'triangle', gain: 0.28 }),
  6: () => playTone({ freq: 420, duration: 0.16, type: 'sine', gain: 0.26 }),
  4: () => playTone({ freq: 260, duration: 0.18, type: 'sine', gain: 0.24 }),
  2: () => playTone({ freq: 160, duration: 0.22, type: 'sine', gain: 0.22 }),
  0: () => playTone({ freq: 90, duration: 0.16, type: 'sine', gain: 0.15 }),
};
function playHitSound(scoreValue) {
  (HIT_SOUND_BY_SCORE[scoreValue] || HIT_SOUND_BY_SCORE[0])();
}

// 番茄命中："偏闷"的音调——独立的振荡器+lowpass滤波器组合（不是复用playTone，
// 因为playTone没有滤波环节，砍高频做出"闷"感需要单独接一个BiquadFilter），
// 叠加一点点短促噪声模拟"啪"的质感。不按环数分级，砸中就是这一个声音。
function playTomatoHitSound() {
  const ctx = ensureAudio();
  const osc = ctx.createOscillator();
  const filter = ctx.createBiquadFilter();
  const g = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(180, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(90, ctx.currentTime + 0.2);
  filter.type = 'lowpass';
  filter.frequency.value = 400; // 砍掉高频，听感发闷
  g.gain.setValueAtTime(0, ctx.currentTime);
  g.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.22);
  osc.connect(filter).connect(g).connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.24);
  playNoiseBurst(0.15, 0.08);
}

// 斧头命中："咔"的钝重感——极低频音调+短促噪声叠加，不按环数分级
function playAxeHitSound() {
  playTone({ freq: 110, freqEnd: 70, duration: 0.16, type: 'triangle', gain: 0.32 });
  playNoiseBurst(0.08, 0.14);
}

// ========== 背景音乐实验（2026-07-10）：纯Web Audio振荡器合成，独立实验 ==========
// 目的是评估"纯合成音乐能不能达到可用质感"，不够的话后续换外部音频文件。
// 不碰任何已有的游戏逻辑/物理常量/碰撞检测，只新增这一块+一个场景内开关面板。
//
// 设计思路：不用"循环一段音频buffer"的做法（容易有接缝感，纯合成也没有
// 现成buffer可循环），而是两层叠加：
//   1) 持续的低音drone（A2主音+E3五度，纯正弦，叠加极慢的LFO做音量的"呼吸感"）
//      ——振荡器本身就是连续信号，只要不重新触发就永远不会有"循环"这回事，
//      天然没有接缝问题。
//   2) 一条稀疏的旋律线，用look-ahead scheduler（跟鼓机/音序器同样的标准做法：
//      提前一小段时间用ctx.currentTime精确排定下一批音符的起始时间，而不是
//      用setInterval硬等，避免JS主线程卡顿导致的音符错拍）在A小调五声音阶
//      (A-C-D-E-G，比自然小调少了容易"刺耳"的B/F，更贴合舒缓氛围)上按固定
//      pattern数组循环触发，pattern本身循环导致的是"旋律重复"，不是"音频
//      接缝"，听感上不会有跳变感。
const MUSIC_SCALE_FREQ = { A3: 220.00, C4: 261.63, D4: 293.66, E4: 329.63, G4: 392.00 };
// 32步 = 4小节(每小节8步/八分音符)，大量休止(null)保持稀疏舒缓，避免"游戏
// 通关配乐"那种密集感——这只是一次快速实验，作曲复杂度故意做得很简单
const MUSIC_PATTERN = [
  'A3', null, null, null, 'C4', null, null, null,
  null, null, 'D4', null, null, null, null, null,
  'E4', null, null, null, 'D4', null, 'C4', null,
  null, null, null, null, 'A3', null, null, null,
];
const MUSIC_BPM = 66; // 舒缓的慢速
const MUSIC_STEP_DURATION = 60 / MUSIC_BPM / 2; // 八分音符时值
const MUSIC_TARGET_GAIN = 0.03; // 总线音量上限——功能性音效的gain普遍在0.15~0.32
// 量级，这里刻意压得很低，保证背景音乐"铺垫"而不是"抢戏"

let musicGainNode = null;
let musicStarted = false;
let musicEnabled = false;
let musicStepIndex = 0;
let musicNextStepTime = 0;
let musicSchedulerHandle = null;

function playMusicNote(freq, startTime) {
  const ctx = ensureAudio();
  const osc = ctx.createOscillator();
  osc.type = 'triangle'; // 比sine略有泛音、比square柔和，适合柔和的旋律音色
  osc.frequency.value = freq;
  const g = ctx.createGain();
  const noteLen = MUSIC_STEP_DURATION * 3; // 拖长到3步时值再衰减完，制造音符之间
  // 轻微重叠的legato感，避免每个音符都"断"得很干净、显得机械
  g.gain.setValueAtTime(0, startTime);
  g.gain.linearRampToValueAtTime(0.5, startTime + 0.18); // 慢起振，柔和不突兀
  g.gain.linearRampToValueAtTime(0, startTime + noteLen);
  osc.connect(g).connect(musicGainNode);
  osc.start(startTime);
  osc.stop(startTime + noteLen + 0.05);
}

function scheduleMusicSteps() {
  const ctx = ensureAudio();
  // look-ahead: 提前0.15秒把落在这个窗口内的音符排好，每100ms检查一次，
  // 是鼓机/音序器常见的调度节奏，比"到点才现算"更抗主线程卡顿
  while (musicNextStepTime < ctx.currentTime + 0.15) {
    const note = MUSIC_PATTERN[musicStepIndex % MUSIC_PATTERN.length];
    if (note) playMusicNote(MUSIC_SCALE_FREQ[note], musicNextStepTime);
    musicStepIndex++;
    musicNextStepTime += MUSIC_STEP_DURATION;
  }
  musicSchedulerHandle = setTimeout(scheduleMusicSteps, 100);
}

function startDrone() {
  const ctx = ensureAudio();
  const droneVoices = [
    { freq: 110.00, gain: 0.5 }, // A2 主音
    { freq: 164.81, gain: 0.28 }, // E3 五度
  ];
  for (const voice of droneVoices) {
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = voice.freq;
    const g = ctx.createGain();
    g.gain.value = voice.gain;
    // 极慢的LFO(周期约12~20秒)微调音量，模拟森林低鸣的"呼吸感"，避免
    // 死板的纯持续音——LFO本身也是连续信号，同样不存在循环接缝的问题
    const lfo = ctx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 0.05 + Math.random() * 0.03;
    const lfoGain = ctx.createGain();
    lfoGain.gain.value = voice.gain * 0.15;
    lfo.connect(lfoGain).connect(g.gain);
    lfo.start();
    osc.connect(g).connect(musicGainNode);
    osc.start();
  }
}

// 只在真正需要发声时才创建/启动这些持续运行的振荡器节点（drone+调度器），
// 避免demo一加载就有一堆常驻振荡器在跑；用户没打开音乐开关之前不会调用这个
function startMusicIfNeeded() {
  if (musicStarted) return;
  musicStarted = true;
  const ctx = ensureAudio();
  musicGainNode = ctx.createGain();
  musicGainNode.gain.value = 0; // 从静音开始，toggle时再淡入，避免一启动就突兀地砰一声
  musicGainNode.connect(ctx.destination);
  startDrone();
  musicNextStepTime = ctx.currentTime + 0.1;
  scheduleMusicSteps();
}

function setMusicEnabled(enabled) {
  musicEnabled = enabled;
  startMusicIfNeeded();
  const ctx = ensureAudio();
  musicGainNode.gain.cancelScheduledValues(ctx.currentTime);
  musicGainNode.gain.setValueAtTime(musicGainNode.gain.value, ctx.currentTime);
  // 0.8秒渐入/渐出，而不是直接跳变到目标音量，开关切换瞬间不会有突兀的
  // "啪"一下——这跟功能性音效追求的"快速起振"是相反的设计意图，背景音乐
  // 要的是不打断沉浸感
  musicGainNode.gain.linearRampToValueAtTime(enabled ? MUSIC_TARGET_GAIN : 0, ctx.currentTime + 0.8);
}

// ---------- 命中评级文字：Canvas贴图 + 简单缩放动画，参考街机投掷类游戏的即时反馈 ----------
// 只有中高分段（6/8/10）才弹字，2/4分和脱靶只有命中标记点，不额外加文字，
// 避免每次投掷都弹一堆文字导致视觉噪音，把"炸裂反馈"留给真正打得好的时候。
const RATING_CONFIG = {
  10: { text: 'EXCELLENT!', color: '#ffe27f', stroke: '#7a5a00' },
  8: { text: 'GREAT!', color: '#ffb37f', stroke: '#6a3510' },
  6: { text: 'GOOD!', color: '#7fd4ff', stroke: '#0a3a55' },
};
const ratingTextures = {};
for (const [scoreKey, cfg] of Object.entries(RATING_CONFIG)) {
  const c = document.createElement('canvas');
  c.width = 400;
  c.height = 140;
  const rctx = c.getContext('2d');
  rctx.textAlign = 'center';
  rctx.textBaseline = 'middle';
  rctx.font = 'bold 64px sans-serif';
  rctx.lineWidth = 8;
  rctx.strokeStyle = cfg.stroke;
  rctx.strokeText(cfg.text, 200, 70);
  rctx.fillStyle = cfg.color;
  rctx.fillText(cfg.text, 200, 70);
  ratingTextures[scoreKey] = new THREE.CanvasTexture(c);
}
console.log('[rating] 贴图已生成，keys =', Object.keys(ratingTextures)); // 排查用：确认贴图确实建好了、key对不对

const RATING_LIFETIME = 1500; // ms
const ratingTexts = []; // { mesh, createdAt, baseY }

// 排查记录（2026-07-10）：上一版实机测试评级文字完全没出现，代码走查没找到
// 明显的"接错线"问题（贴图生成、resolveThrow调用链、scene.add都看起来是对
// 的），怀疑要么是这里有个还没发现的隐藏bug，要么是当时的测试投掷根本没有
// 打到6环以上（只有6/8/10分才弹字，2/4分和脱靶只有命中标记点，没有文字）。
// 没有实机验证不能瞎猜，所以先加日志，下次测试时看这几行有没有打印、
// scoreValue具体是多少，再决定要不要动这块逻辑。
// 2026-07-11第十三轮：z参数同spawnHitMarker()，默认TARGET_POS.z维持第一关
// 行为不变，第二/三关命中敌人时改传敌人实际深度，评级文字才能跟被击毙
// 的敌人本体出现在同一个位置附近，而不是永远飘在靶面那个固定平面上。
function spawnRatingText(x, y, scoreValue, z = TARGET_POS.z) {
  const texture = ratingTextures[scoreValue];
  console.log('[rating] spawnRatingText被调用, scoreValue =', scoreValue, ', 找到贴图 =', !!texture);
  if (!texture) return; // 2/4/0分不弹字，本身不是bug——只是没有对应贴图，正常return

  const mat = new THREE.MeshBasicMaterial({ map: texture, transparent: true, depthTest: false });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(0.32, 0.112), mat);
  const baseY = y + 0.1;
  mesh.position.set(x, baseY, z + 0.01); // 比命中标记点更靠摄像机一点，避免叠在一起z-fighting
  mesh.renderOrder = 1000;
  scene.add(mesh);
  console.log('[rating] mesh已生成并add到scene，位置 =', mesh.position.toArray());
  ratingTexts.push({ mesh, createdAt: performance.now(), baseY });
}

function updateRatingTexts(now) {
  for (let i = ratingTexts.length - 1; i >= 0; i--) {
    const r = ratingTexts[i];
    const age = now - r.createdAt;
    if (age > RATING_LIFETIME) {
      scene.remove(r.mesh);
      r.mesh.material.dispose();
      ratingTexts.splice(i, 1);
      continue;
    }

    // 前150ms做一个简单的"弹出感"缩放（overshoot再回落），之后保持1倍大小
    // 缓慢上飘，最后400ms淡出——不追求精确的缓动曲线，够用就好
    let scale;
    if (age < 150) {
      const t = age / 150;
      scale = 0.3 + t * 0.85 + Math.sin(t * Math.PI) * 0.15;
    } else {
      scale = 1.0;
    }
    r.mesh.scale.set(scale, scale, 1);
    r.mesh.position.y = r.baseY + Math.min(Math.max(age - 150, 0), 1000) / 1000 * 0.08;
    r.mesh.material.opacity = age < 900 ? 1 : Math.max(0, 1 - (age - 900) / (RATING_LIFETIME - 900));
    r.mesh.quaternion.copy(camera.quaternion); // 始终朝向摄像机
  }
}

// ---------- 抓取/投掷状态机 ----------
// 状态：'idle'（悬浮在场景固定位置，轻微浮动动画，未锁定）
//      'held'（抓着，刚性跟随抓取它的那只手，记录位置+朝向历史）
//      'flying'（已投掷，velocity+gravity逐帧积分）
//
// 不预设左右手：飞镖闲置时停在场景里一个固定的中性位置（不挂在任何一个
// controller index上），哪只手先抓就归哪只手，松开后飞镖飞出去、计分、
// 再回到中性位置，等下一次任意一只手抓取。之前这里硬编码成"默认挂在
// controller0"，在Pico 4 Ultra上controller0固定对应左手，导致惯用右手
// 的用户抓不到——这是之前修的问题，这次没再动。
const STATE = { IDLE: 'idle', HELD: 'held', FLYING: 'flying' };
let dartState = STATE.IDLE;

let holderController = null;  // held/flying起点：当前（或刚才）抓着飞镖的手柄

const IDLE_POS = new THREE.Vector3(0, 1.3, -0.35); // 中性待抓取位置，双手都够得着
const GRAB_OFFSET = new THREE.Vector3(0.03, -0.02, -0.08); // 抓住后飞镖相对手柄的偏移
const HISTORY_LEN = 5; // 滑动窗口帧数：从8帧缩短到5帧，提高对短促手腕甩动的响应
let posHistory = []; // { p: Vector3(controller世界坐标), q: Quaternion(controller世界朝向), t: number(ms) }

const dartVelocity = new THREE.Vector3();
const GRAVITY = 9.8; // m/s^2，跟真实世界一致，不做人为放大/缩小
let flightTime = 0;
const MAX_FLIGHT_TIME = 4; // 秒，超时兜底判脱靶，避免飞镖飞出天际卡住状态机

let totalScore = 0;
let throwCount = 0;
let lastScore = 0;
let lastThrowSpeed = 0;
let lastHitDistance = null; // 命中点距靶心的原始距离（米），null表示没有穿过靶平面

// 2026-07-11第十四轮：真机反馈拖尾特效"时灵时不灵"——只在大幅度挥掷飞镖
// 时看到过两三次，绝大多数正常力度投掷(含番茄/斧头)完全看不到。上一轮
// 把这归因于"斧头颜色对比度不够"，用户反馈这个诊断是错的，要求推翻重查。
// 用Playwright模拟了1~15m/s的速度范围(round14_trail_investigate.js)，
// 发现代码里不存在硬性的速度阈值(sparkCount在任意速度下最低都是1，
// 从来不会归零)，但发现了一个此前没意识到的规律：飞行速度越快，飞行
// 时长越短(更快穿过靶面)，这一轮测试范围内高速投掷的粒子总数反而更少
// (18~24个)、低速投掷的粒子总数更多(64~80个)——但低速投掷的粒子分布在
// 更长的飞行时间(0.5~0.67秒)和更短的空间距离上，每个粒子存活时间只有
// 0.22~0.4秒，很可能表现为"手边一小团若隐若现的光点"而不是"一条延伸的
// 拖尾"，达不到"拖尾"应有的视觉长度，容易被忽略；只有速度足够快、飞行
// 距离拉开之后，拖尾才会呈现出清晰可辨认的"streak"观感。这是一个能自洽
// 解释"时灵时不灵"现象的合理猜想，但没有真机条件复验，所以这次除了下面
// 直接把粒子存活时间拉长(让拖尾在低速投掷下也能拉出更长的可见轨迹)这个
// 低风险改动之外，同时按用户要求加上一次性的console.log诊断——每次投掷
// 结束时打印本次初速度和拖尾粒子总数，下次真机测试时这行日志能直接告诉
// 我们真实的对应关系，而不是继续靠桌面模拟猜测。
let flightSparkCount = 0; // 本次飞行累计生成的拖尾粒子数，投掷开始时清零，resolveThrow时打印+重置

function resetDartToIdle() {
  dartState = STATE.IDLE;
  holderController = null;
  dartVelocity.set(0, 0, 0);
  posHistory = [];
}

// ---------- 抓取输入：原生事件 + 模拟量阈值双通道 ----------
// 之前用squeeze(抓握键)判定抓取，2026-07-10测试确认响应正常，但用户反馈
// trigger(食指扳机)更符合"抓取/发射"类动作的生理直觉——抓取判定改成读
// trigger，之前调好的响应机制（阈值滞回、预抓取发光）原样保留，只是换了
// 监听的物理按键源。
//
// GRAB_BUTTON_INDEX=0是WebXR "xr-standard"手柄映射的约定值（0=trigger，
// 1=squeeze），但这个约定有没有真的对应Pico实机的按键布局，之前从来没有
// 实测确认过。下面的logGamepadButtonChanges()是专门加来验证这件事的：
// 进VR后随便按一个键，控制台会打印出是哪个buttons[i]的value在变化，
// 拿真实数据核对——不能凭标准映射就假设"肯定是这样"。
const GRAB_THRESHOLD = 0.6;    // 模拟量超过这个值，判定为"确实抓住了"
const RELEASE_THRESHOLD = 0.45; // 比GRAB_THRESHOLD低一截，做个迟滞区间，避免数值在临界点抖动导致反复抓/放
const PRE_GRAB_THRESHOLD = 0.3; // 超过这个值但还没到GRAB_THRESHOLD，触发"预抓取"发光提示
const GRAB_BUTTON_INDEX = 0; // xr-standard映射：0=trigger扳机（这次改用的键），1=squeeze抓握键（现在给道具切换用，退出VR第九轮改成了独立的手柄按键，不再用squeeze）

const inputSources = [null, null]; // 对应 controller0/controller1 的 XRInputSource，从connected事件拿

function getGrabButtonValue(idx) {
  const src = inputSources[idx];
  const gp = src && src.gamepad;
  if (!gp) return null; // 拿不到模拟量数据，调用方要fallback到原生事件
  const btn = gp.buttons[GRAB_BUTTON_INDEX];
  if (!btn) return null;
  return typeof btn.value === 'number' ? btn.value : (btn.pressed ? 1 : 0);
}

// 排查用：打印手柄按键实测数据，验证GRAB_BUTTON_INDEX这个索引到底对不对。
// 按边沿触发（从没按到按下的那一帧才打印一次），不是每帧打印，不然按住
// 不放的时候控制台会被刷屏。进VR后依次单独按trigger、squeeze等按键，
// 观察打印出来的buttons[i]分别是哪个索引，跟GRAB_BUTTON_INDEX/退出按钮
// 用的squeeze索引对照，确认改对了键位。
const prevButtonActive = [[], []];
function logGamepadButtonChanges(idx) {
  const src = inputSources[idx];
  const gp = src && src.gamepad;
  if (!gp) return;
  gp.buttons.forEach((btn, i) => {
    const active = btn.value > 0.1 || btn.pressed;
    const wasActive = prevButtonActive[idx][i] || false;
    if (active && !wasActive) {
      console.log(`[按键排查] controller${idx} buttons[${i}] 按下了, value=${btn.value.toFixed(2)}`);
    }
    prevButtonActive[idx][i] = active;
  });
}

let hintOn = false; // 预抓取发光提示是否激活，animate()里读这个来驱动呼吸动画

function grabDart(controller) {
  if (dartState !== STATE.IDLE) return;
  dartState = STATE.HELD;
  holderController = controller;
  posHistory = [];
  hintOn = false; // 已经抓稳了，取消发光提示
  playGrabSound();
}

function releaseDart(controller) {
  if (dartState !== STATE.HELD || holderController !== controller) return;

  // ---- 速度计算：线性速度（窗口平均） + 旋转带来的切向速度 ----
  // 手腕甩动的特征是"朝向变化快、位移距离短"，纯线性位移窗口对这种动作
  // 天然不敏感——之前只算线性速度，会把手腕甩动的力道稀释掉。这里补上
  // 旋转贡献：飞镖抓在手上时相对controller原点有一个偏移(GRAB_OFFSET)，
  // controller转动时，这个偏移点会因为"杠杆效应"获得额外的切向速度，
  // 公式是刚体运动学的 v_point = v_origin + ω × r（r是偏移向量，ω是角速度）。
  // 大幅度手臂投掷本身转动较慢，这一项贡献很小，不会干扰原有判定；
  // 小幅度手腕甩动转动快，这一项能补足纯线性位移算出来的"虚弱"速度。
  if (posHistory.length >= 2) {
    const first = posHistory[0];
    const last = posHistory[posHistory.length - 1];
    const dt = (last.t - first.t) / 1000;

    if (dt > 0.001) {
      const linVel = last.p.clone().sub(first.p).divideScalar(dt);

      // 四元数差 → 轴角，得到这段时间的旋转轴+角速度
      const deltaQuat = last.q.clone().multiply(first.q.clone().invert());
      if (deltaQuat.w < 0) {
        // q和-q表示同一个旋转，统一符号避免acos算出"绕远路"的角度
        deltaQuat.set(-deltaQuat.x, -deltaQuat.y, -deltaQuat.z, -deltaQuat.w);
      }
      const angle = 2 * Math.acos(THREE.MathUtils.clamp(deltaQuat.w, -1, 1));
      const s = Math.sqrt(1 - deltaQuat.w * deltaQuat.w);
      const axis = s < 1e-6
        ? new THREE.Vector3(0, 0, 0)
        : new THREE.Vector3(deltaQuat.x, deltaQuat.y, deltaQuat.z).divideScalar(s);
      const angularVel = axis.multiplyScalar(angle / dt); // rad/s

      const worldOffset = GRAB_OFFSET.clone().applyQuaternion(last.q);
      const tangentialVel = angularVel.clone().cross(worldOffset);

      dartVelocity.copy(linVel).add(tangentialVel);
    } else {
      dartVelocity.set(0, 0, 0);
    }
  } else {
    dartVelocity.set(0, 0, 0); // 抓起来不到2帧就松手，视为没有有效投掷动作
  }

  lastThrowSpeed = dartVelocity.length();
  dartState = STATE.FLYING;
  flightTime = 0;
  flightSparkCount = 0; // 新一次飞行开始，拖尾粒子计数清零
  holderController = null;
}

function attachControllerEvents(controller, idx) {
  controller.addEventListener('connected', (e) => { inputSources[idx] = e.data; });
  controller.addEventListener('disconnected', () => { inputSources[idx] = null; });
  // 原生事件：兜底路径，万一模拟量拿不到，至少这条还能用。trigger对应的
  // WebXR标准事件名是select/selectstart/selectend（这是规范定义的固定
  // 名字，不是设备相关的东西，不需要像按钮索引那样实测确认）。
  // 2026-07-11新增：gameOverActive时扳机键改成触发重开，不再走抓取——
  // gameOverActive/restartLevel是本文件后面"小游戏框架"那段加的，这里只是
  // 新增一个前置判断分支，grabDart()本身一个字没动。
  controller.addEventListener('selectstart', () => {
    if (gameOverActive) { restartLevel(); return; }
    grabDart(controller);
  });
  controller.addEventListener('selectend', () => releaseDart(controller));
  scene.add(controller);
}

const controller0 = renderer.xr.getController(0);
const controller1 = renderer.xr.getController(1);
attachControllerEvents(controller0, 0);
attachControllerEvents(controller1, 1);

// 每帧轮询模拟量，驱动更灵敏的抓取判定 + 预抓取发光提示
function updateAnalogGrabInput() {
  logGamepadButtonChanges(0);
  logGamepadButtonChanges(1);

  // gameOverActive时不做抓取相关的模拟量判定——重开走的是原生selectstart
  // 事件的边沿触发（见attachControllerEvents），这里如果也跟着触发，
  // 因为是每帧轮询、扳机按住不放的话会每帧都调一次restartLevel()，
  // 不干净，所以直接跳过，交给边沿触发的那条路径处理。
  if (gameOverActive) return;

  let hint = false;
  const controllers = [controller0, controller1];
  for (let i = 0; i < controllers.length; i++) {
    const controller = controllers[i];
    const value = getGrabButtonValue(i);
    if (value === null) continue; // 这只手没有可用的模拟量，交给原生事件兜底

    if (dartState === STATE.IDLE) {
      if (value >= GRAB_THRESHOLD) {
        grabDart(controller);
      } else if (value >= PRE_GRAB_THRESHOLD) {
        hint = true;
      }
    } else if (dartState === STATE.HELD && holderController === controller) {
      if (value < RELEASE_THRESHOLD) {
        releaseDart(controller);
      }
    }
  }
  if (dartState === STATE.IDLE) hintOn = hint;
}

// ---------- 投掷物选择面板：3个小方块，射线指向+抓握键点击切换 ----------
// 视觉/交互模式照抄退出按钮那一套（挂在camera下、射线命中检测、hover高亮），
// 但故意没有用户建议的trigger作为点击键，改用了squeeze——原因：trigger

// 完全一致的实现决定，写在这里说明原因，README里也会提一句。
// 2026-07-11第七轮：真机反馈这块面板离摄像机太近(原z=-0.55)，手柄射线
// 角度容差太窄导致瞄不准，当时的做法是"挪到z=-1.3，距离和尺寸按同样倍数
// 放大，维持屏幕视觉大小不变"。
// 2026-07-11第八轮：用户指出这个思路本身有问题——纯粹的等距放大不会改变
// 面板在视野里占据的角度范围，"射线覆盖不全"的根本原因根本没解决。这次
// 换思路：不再追求"维持原来的视觉大小"，而是把面板整个挪到跟攻击目标物
// (靶/敌人)同一个距离数量级(TARGET_POS.z=-2.5附近)、挂在scene下而不是
// camera下——道理是：手柄本身就是靠"对着世界空间里的物体扔东西"练出来的
// 瞄准直觉(靶/狐狸/老鼠都在这个距离，玩家全程都在用手柄射线+抛物线瞄准
// 它们)，把UI面板放在同一个距离范围，等于直接复用玩家已经很熟悉、已经
// 验证过好用的那套瞄准手感，而不是另外发明一个"UI专属的合适距离"。
// 面板视觉尺寸相应缩小(不再要求跟原来的屏幕占比一致)，只要文字仍然清晰
// 可辨识——具体数值这一轮没有真机条件验证，下一轮需要确认。
// 挂到scene下之后，面板不再随头部转动固定在视野里，而是像靶/敌人一样
// 是场景里的真实物体——这个游戏本来就没有自由走动/传送，玩家全程站在
// 固定位置正对着靶，跟target/backboard等其它场景物体一样不需要额外的
// billboard朝向逻辑，默认朝向(+Z)已经正对着摄像机。
// 三个选项改成竖排(而不是横排)，让整个面板的水平宽度很窄，可以放在
// 第二/三关敌人巡逻范围(x: -1.3~1.3)以外的左侧，不会被巡逻中的狐狸/老鼠
// 挡住或产生视觉混淆。
const SELECT_PANEL_WORLD_POS = new THREE.Vector3(-1.9, 2.0, -2.3);
const OPTION_SIZE = 0.42;
const OPTION_GAP = 0.06;

const selectPanelGroup = new THREE.Group();
selectPanelGroup.position.copy(SELECT_PANEL_WORLD_POS);
scene.add(selectPanelGroup);

const optionMeshes = {}; // type -> { mesh, canvas, ctx, texture }
ITEM_ORDER.forEach((type, idx) => {
  const canvas = document.createElement('canvas');
  canvas.width = 160;
  canvas.height = 160;
  const ctx = canvas.getContext('2d');
  const texture = new THREE.CanvasTexture(canvas);
  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(OPTION_SIZE, OPTION_SIZE),
    new THREE.MeshBasicMaterial({ map: texture, transparent: true, depthTest: false })
  );
  mesh.position.set(0, -idx * (OPTION_SIZE + OPTION_GAP), 0); // 竖排：从上往下排列
  mesh.renderOrder = 999;
  selectPanelGroup.add(mesh);
  optionMeshes[type] = { mesh, canvas, ctx, texture };
});

function drawOption(type, hovered, selected) {
  const { ctx, canvas, texture } = optionMeshes[type];
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = selected ? 'rgba(50,120,80,0.9)' : hovered ? 'rgba(120,30,30,0.9)' : 'rgba(10,14,22,0.75)';
  ctx.strokeStyle = selected ? '#8fffa8' : hovered ? '#ff9f7f' : '#3a4a60';
  ctx.lineWidth = selected || hovered ? 6 : 3;
  ctx.beginPath();
  ctx.roundRect(4, 4, canvas.width - 8, canvas.height - 8, 14);
  ctx.fill();
  ctx.stroke();

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#cfe8ff';
  ctx.font = 'bold 30px sans-serif';
  ctx.fillText(ITEM_TYPES[type].label, canvas.width / 2, canvas.height / 2);

  texture.needsUpdate = true;
}
ITEM_ORDER.forEach((type) => drawOption(type, false, type === currentItemType));

function switchItemType(type) {
  if (type === currentItemType || !itemGroups[type]) return;
  if (dartState !== STATE.IDLE) return; // 持有/飞行中不允许切换，避免半路换物体产生奇怪的状态

  itemGroups[currentItemType].group.visible = false;
  currentItemType = type;
  dart = itemGroups[type].group;
  currentHintMat = itemGroups[type].hintMat;
  currentTrailColor = ITEM_TYPES[type].trailColor;
  dart.visible = true;

  ITEM_ORDER.forEach((t) => drawOption(t, false, t === currentItemType));
  console.log('[item] 切换投掷物为', type);
}

// 2026-07-11第九轮：squeeze键在"道具切换"和"抓取投掷物"之间的判定规则
// （完整状态机见README"按键行为规则"一节）——
//   dartState===IDLE(手上没有持有投掷物)时：squeeze按下直接循环切换到
//   下一个道具(dart→tomato→axe→dart)，这是现在的主要切换方式，不需要
//   瞄准任何东西；如果squeeze按下的同时手柄射线正好指着选择面板上的
//   某个具体选项，那次squeeze优先做"精确选中该选项"，而不是简单循环
//   （瞄准面板作为备选/精确选择方式保留，位置沿用(-1.9,2.0,-2.3)不变）。
//   dartState!==IDLE(HELD/FLYING，手上正抓着或正在飞的投掷物)时：squeeze
//   不做任何道具切换相关的事情——抓取/投掷的状态机完全由trigger(扳机)
//   驱动(GRAB_BUTTON_INDEX=0，受保护常量)，squeeze在这个状态下单纯被
//   忽略，不会跟trigger的抓取判定冲突，也不会误触切换。
function cycleItemType() {
  if (dartState !== STATE.IDLE) return;
  const idx = ITEM_ORDER.indexOf(currentItemType);
  const next = ITEM_ORDER[(idx + 1) % ITEM_ORDER.length];
  switchItemType(next);
}

const selectRaycaster = new THREE.Raycaster();
const selectRayOrigin = new THREE.Vector3();
const selectRayDir = new THREE.Vector3();
let pendingItemSqueeze = [];

// ---------- 瞄准辅助线：按住squeeze时从手柄延伸出的半透明光束 ----------
// 2026-07-11第十四轮：真机反馈卡册按钮(以及本来就存在的物品选择面板)
// "瞄准几乎不可能"——没有任何可视化的射线提示，玩家只能凭手柄朝向盲猜。
// 用户建议的方案：按住squeeze时召唤一条可见的辅助瞄准线，松开消失，不
// 常驻画面。这条线纯粹是视觉提示，跟squeeze原有的两个功能(道具切换/
// 抓取投掷物的判定，见下面squeezestart监听器里的完整规则说明)是两件
// 互不相干的事——squeeze按下时，"呼出辅助线"和"记录这次squeeze待处理"
// 同时发生，不管这次squeeze最终会被物品选择面板/卡册按钮/循环切换的
// 哪一条逻辑消费掉，辅助线该出现就出现，不受影响；松开squeeze辅助线
// 消失，同样不影响原有判定。
// 线的方向复用selectRayDir同一个约定(本地-Z)，长度给6米，覆盖到这一轮
// 稍后会挪远到5米+的卡册展示位置。用挖空的圆柱体(radialSegments低+
// openEnded)而不是LineBasicMaterial，是因为部分WebXR运行时对线宽
// (linewidth)的支持不稳定，圆柱体在所有平台上都能正确显示出"粗细"。
function buildAimBeam(length) {
  const geo = new THREE.CylinderGeometry(0.003, 0.007, length, 8, 1, true);
  geo.rotateX(-Math.PI / 2); // 默认长轴沿Y，转成沿本地-Z，跟射线方向(0,0,-1)一致
  geo.translate(0, 0, -length / 2); // 让一端落在controller原点，另一端朝-Z延伸
  const mat = new THREE.MeshBasicMaterial({
    color: 0x7fd4ff, transparent: true, opacity: 0.4, depthTest: false, side: THREE.DoubleSide,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.renderOrder = 998;
  mesh.visible = false;
  return mesh;
}
const AIM_BEAM_LENGTH = 6;
const aimBeams = [buildAimBeam(AIM_BEAM_LENGTH), buildAimBeam(AIM_BEAM_LENGTH)];
controller0.add(aimBeams[0]);
controller1.add(aimBeams[1]);

// 2026-07-11第九轮定下的squeeze行为规则(手上无道具时循环切换/瞄准面板
// 精确选中，手上有道具时squeeze被忽略，完整规则见updateItemSelectPanel
// 和cycleItemType的注释)——这次新增的辅助线呼出逻辑不改变上述任何判定，
// 只是在squeezestart/squeezeend这两个原生事件上各自附加一行"这只手的
// 辅助线开/关"，两件事完全解耦。
[controller0, controller1].forEach((controller, idx) => {
  controller.addEventListener('squeezestart', () => {
    pendingItemSqueeze.push(controller);
    aimBeams[idx].visible = true;
  });
  controller.addEventListener('squeezeend', () => {
    aimBeams[idx].visible = false;
  });
});

function controllerHitsOption(controller, type) {
  controller.updateWorldMatrix(true, false);
  selectRayOrigin.setFromMatrixPosition(controller.matrixWorld);
  selectRayDir.set(0, 0, -1).transformDirection(controller.matrixWorld);
  selectRaycaster.set(selectRayOrigin, selectRayDir);
  return selectRaycaster.intersectObject(optionMeshes[type].mesh, false).length > 0;
}

function updateItemSelectPanel() {
  // 2026-07-11第八轮：面板现在挂在scene下(世界固定位置)，不再是camera的
  // 子物体，矩阵更新走场景图正常的每帧更新，不需要像以前camera子物体
  // 那样手动强制刷新camera.updateMatrixWorld()了。

  let hoveredType = null;
  outer:
  for (const controller of [controller0, controller1]) {
    for (const type of ITEM_ORDER) {
      if (controllerHitsOption(controller, type)) {
        hoveredType = type;
        break outer;
      }
    }
  }
  ITEM_ORDER.forEach((type) => drawOption(type, type === hoveredType, type === currentItemType));

  if (pendingItemSqueeze.length > 0) {
    for (const controller of pendingItemSqueeze) {
      let hitType = null;
      for (const type of ITEM_ORDER) {
        if (controllerHitsOption(controller, type)) { hitType = type; break; }
      }
      if (hitType) {
        switchItemType(hitType); // 瞄准面板精确选中，优先级更高
      } else {
        cycleItemType(); // 没瞄准面板时，squeeze的默认行为是循环切换到下一个道具
      }
    }
    pendingItemSqueeze = [];
  }
}

// ========== 小游戏框架：生命值/连击计分/进度条/过关失败反馈 ==========
// 2026-07-11 第五轮：从"单一靶场测试"升级成三关小游戏，红白机式设计
// （目标清晰、失败成本低、难度曲线诚实）。这一大段是跟具体关卡内容无关
// 的通用框架，先在第一关（复用现有靶场）上跑通验证，后续阶段再接第二/
// 三关。全程不修改7个受保护的物理常量和碰撞检测代码块，只在resolveThrow/
// animate()这些下游消费者里新增分支逻辑。

// ---------- 关卡配置 ----------
// 阈值先给出一版合理估计，具体数值会写进README，方便后续实测后调整平衡性
// 2026-07-11第十四轮：关卡名称简化，"番茄护兔"->"狐狸抓兔子"、
// "斧头护蛋"->"老鼠偷蛋"，只改显示文案，武器/关卡机制/参数一个字没动。
const LEVEL_NAMES = ['飞镖打靶', '狐狸抓兔子', '老鼠偷蛋'];
// 2026-07-10：第二关阈值从500下调到400。原因见README"第五轮真机反馈"一节，
// 简述：ENEMY_HIT_SCORE固定8分/命中，连击顶格2.0倍，500分需要约33次命中
// (哪怕全程不脱靶)，对"第二关"这个中间关卡来说绝对量偏多；这次同时修复了
// 进度条不可见(玩家之前完全看不到还差多少)和把敌人从直线掃射改成"移动-
// 停顿-移动"(停顿时是静止瞄准窗口，命中率应显著提升)，命中效率提升后，
// 500分对应的实际耗时仍然偏长，所以在两项根因修复之后再下调阈值到400
// (约25次命中)，跟第一关(300)/第三关(800)保持有区分度但不过分陡峭的曲线
const LEVEL_THRESHOLDS = [300, 400, 800]; // 第一关最低，逐关递增
let currentLevel = 0;

// ---------- 生命值 ----------
const MAX_LIVES = 3;
let lives = MAX_LIVES;
let gameOverActive = false; // true时，扳机不再触发抓取，改成触发重开

const heartsCanvas = document.createElement('canvas');
heartsCanvas.width = 300;
heartsCanvas.height = 100;
const heartsCtx = heartsCanvas.getContext('2d');
const heartsTexture = new THREE.CanvasTexture(heartsCanvas);
// 2026-07-11第八轮：上一轮把血量挪到scene下的世界固定位置(跟靶/敌人
// 同深度)，跟物品选择面板/退出VR面板一样的处理。
// 2026-07-11第九轮：真机反馈血量应该跟得分/进度条面板对齐、放在同一个
// 视野区域——血量是纯只读展示（不需要瞄准/点击），跟进度条(progressMesh)
// 性质完全一样，这次改回camera子物体，紧贴在进度条左侧、同一竖直高度，
// 两者视觉上组成同一片状态信息区。注意这仍然是两个独立的Mesh/贴图对象，
// 没有合并成一张贴图，只是位置紧邻。
// 第一版把偏移量设成-0.38，截图验证时发现在z=-0.55这么近的距离下，这点
// 世界坐标偏移换算成视角就已经接近35°(atan(0.38/0.55))，视觉上被推到了
// 屏幕边缘，完全不像"紧邻"——距离越近，同样的世界坐标偏移对应的视角
// 越大，这是跟"手柄瞄准角度容差"同一个几何道理，只是这次体现在UI布局
// 上。改成更小的尺寸(0.15m宽)+更小的偏移(-0.33)后确认贴在了进度条左侧。
// 2026-07-11第十轮：真机反馈血量本身还是贴脸太近——问题是当时只对齐了
// "位置"，没对齐"距离"，两者(血量+进度条)仍然停留在z=-0.55。这次两个
// 一起挪到z=-1.3(见progressMesh的说明)，尺寸/偏移同样按1.3/0.55≈2.364
// 的倍数放大，跟进度条保持同一距离、同一竖直高度，紧邻在它左侧。
// 2026-07-11第十一轮：真机反馈调整后仍然"贴脸"。Playwright反复核实过
// 代码/部署/渲染链路，距离数值本身确认正确(见README"真机反馈第十一轮"
// 一节)，怀疑点转向：血量在x=-0.78这个位置离屏幕中心的夹角(约38.6°)
// 比进度条大得多——把血量往中心方向收一点，夹角降到约26.1°。
// 2026-07-11第十二轮：用户提供了真机截图，用黄圈标出了"得分/FPS"那块
// 世界坐标面板(`panel`变量，位置在(0,2.35,-2.5)，紧挨着靶心)作为已确认
// 正确的距离参照物，要求血量/进度条/提示文字/退出VR牌统一对齐到跟它
// 完全相同的Z坐标(-2.5)，不再用camera子物体+局部z偏移的猜测数值。
// 这次把血量从camera子物体改成scene子物体(世界坐标)，直接把z设成-2.5，
// x/y保持跟原来camera本地偏移相同的视觉夹角——用camera默认位置(0,1.6,2.2)
// 换算：k = 新z深度差(4.7=2.2-(-2.5)) / 旧z深度差(1.3) ≈ 3.6154，
// 新world.x = 旧local.x*k，新world.y = 1.6 + 旧local.y*k，这样在camera
// 处于默认姿态时跟以前占据的屏幕角度完全一致，只是挪到了跟参照面板
// 相同的深度。几何尺寸也按同样的k倍数放大，保持视觉大小不变。
// 2026-07-11第十三轮：真机反馈z=-2.5这个距离(实测3.3~3.8米)仍然太近，
// 要求拉远到6米以外。这次不是简单再放大同一个方向的距离——用Playwright
// 实测(见round13_check_overlap.js)确认了血量所在的方向(camera正前方偏
// 水平角-19.1°、俯仰角+19.1°，即正上方区域)跟第二/三关敌人+保护对象
// 的巡逻区间(俯仰角全部落在-11.4°~-22.7°之间，即正下方区域)完全没有
// 交集，本来就不会挡到关卡内容，只需要把距离(在同一个方向上)继续拉远
// 即可。目标桌面模型下的直线距离定为10米(用camera.position到面板的
// 欧氏距离衡量，跟得分面板/退出VR牌这次采用同一套目标)——选10而不是
// 刚好6，是因为第十二轮的实测数据显示：桌面模型算出来的距离(5.08米)
// 和真机实测的距离(3.3~3.8米)存在系统性差异(真机测出来的更近，压缩比
// 约0.7)，桌面模型这边的Playwright没有能力还原真机WebXR会话具体的
// reference space坐标系差异，所以直接按6米/0.7≈8.6再加一点安全余量
// 定到10米，保证哪怕真机继续呈现类似比例的压缩，也能稳稳落在6米以外，
// 而不是卡在临界值附近。方向保持跟原来完全一致(-19.09°,+19.09°)，
// 用统一的direction-vector*distance方式换算新的世界坐标(camera.position
// + 方向单位向量*10)，跟之前"沿camera本地偏移换算"的写法效果一致，
// 只是这次距离改成主动指定的目标值而不是继承局部偏移。几何尺寸按
// 距离放大倍数k=10/5.233≈1.911同比放大，保持视觉大小不变。
// 2026-07-11第十四轮：真机反馈血条位置可以接受，但整体面积过大、不适、
// 难以一次看全——只缩小几何尺寸，位置(下面的position.set)不动。按0.6倍
// 缩小(2.450x0.817 -> 1.470x0.490)，canvas贴图分辨率/心形图标本身的绘制
// 参数不用跟着改，缩小物理尺寸本身就会让同一张贴图在画面上显得更小，
// 不需要额外改drawHeartsHUD()里的size/gap数值。
const heartsMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(1.470, 0.490),
  new THREE.MeshBasicMaterial({ map: heartsTexture, transparent: true, depthTest: false })
);
heartsMesh.position.set(-3.091, 4.871, -6.730);
heartsMesh.renderOrder = 999;
scene.add(heartsMesh);

// 用贝塞尔曲线画一个简单的心形，不依赖emoji字体渲染（不同头显/浏览器对
// emoji字体的支持不一致，自己画的形状更可控）
function drawHeartShape(ctx, cx, cy, size, filled) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.beginPath();
  ctx.moveTo(0, size * 0.32);
  ctx.bezierCurveTo(-size * 0.5, -size * 0.28, -size, size * 0.12, 0, size * 0.85);
  ctx.bezierCurveTo(size, size * 0.12, size * 0.5, -size * 0.28, 0, size * 0.32);
  ctx.closePath();
  ctx.fillStyle = filled ? '#ff4a5a' : 'rgba(70,20,24,0.5)';
  ctx.fill();
  ctx.strokeStyle = filled ? '#ffc4c9' : '#4a2a2c';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.restore();
}

function drawHeartsHUD() {
  heartsCtx.clearRect(0, 0, heartsCanvas.width, heartsCanvas.height);
  const size = 34;
  const gap = 46;
  const startX = 40;
  for (let i = 0; i < MAX_LIVES; i++) {
    drawHeartShape(heartsCtx, startX + i * gap, 50, size, i < lives);
  }
  heartsTexture.needsUpdate = true;
}
drawHeartsHUD();

// ---------- 连击倍率 + 进度条 ----------
// 连续命中环数>=6分时倍率递增：1.0(第1次达标) -> 1.2(第2次) -> 1.5(第3次)
// -> 2.0(第4次及以上)，脱靶或环数<6直接清零重置。具体数值在README说明，
// 方便后续调整平衡性。
const COMBO_TABLE = [1.0, 1.2, 1.5, 2.0];
const COMBO_QUALIFY_SCORE = 6;
let comboStreak = 0;
let comboMultiplier = 1.0;
let levelScore = 0;

// ---------- 连击专属反馈：达到里程碑节点时的额外视觉/听觉冲击 ----------
// 2026-07-11第十一轮新增：原来连击只体现在数值(倍率×分数)和进度条上的
// 小字"连击x2.0"，反馈强度跟单次命中的GOOD/GREAT/EXCELLENT差不多，玩家
// 感受不到"越连越爽"的递进感。这里加一层专属反馈，只在连击数达到里程碑
// (第3次、第5次，之后每5次)时触发一次，比常规评级文字更大、更亮、停留
// 更久，配合音调随连击数递增的音效，做出"这次不一样"的强烈瞬间反馈。
// 位置特意选在视野中央偏上(而不是命中点)——命中点已经有常规评级文字，
// 这个是独立的"全局庆祝"效果，短暂(1秒)划过视野中央，不会长时间挡住
// 瞄准视线。
const COMBO_BURST_LIFETIME = 1000; // ms，比常规评级文字(1500ms)更短但视觉冲击更强，快速过场不影响下一次瞄准
const comboBurstCanvas = document.createElement('canvas');
comboBurstCanvas.width = 640;
comboBurstCanvas.height = 200;
const comboBurstCtx = comboBurstCanvas.getContext('2d');
const comboBurstTexture = new THREE.CanvasTexture(comboBurstCanvas);
const comboBurstMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(0.85, 0.266),
  new THREE.MeshBasicMaterial({ map: comboBurstTexture, transparent: true, depthTest: false })
);
comboBurstMesh.position.set(0, 0.12, -1.3); // camera子物体，视野中央偏上，跟其它HUD同一批第十轮统一的1.3米距离
comboBurstMesh.renderOrder = 1500; // 比普通评级文字(1000)更高，确保叠加时盖在最上面
comboBurstMesh.visible = false;
camera.add(comboBurstMesh);

let comboBurstStartTime = 0;

function drawComboBurst(streak) {
  const ctx = comboBurstCtx;
  ctx.clearRect(0, 0, comboBurstCanvas.width, comboBurstCanvas.height);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 84px sans-serif';
  ctx.lineWidth = 10;
  ctx.strokeStyle = '#7a3d00';
  ctx.strokeText(`连击 x${streak}!`, 320, 100);
  ctx.fillStyle = '#ffd23f';
  ctx.fillText(`连击 x${streak}!`, 320, 100);
  comboBurstTexture.needsUpdate = true;
}

// 音调随连击数递增而升高(封顶避免无限升高刺耳)，叠加一个五度音做出更
// 丰富的"连击"音色，每5连击额外加一层欢呼感白噪声，制造"越连越爽"的
// 听觉递进感——复用已有的playTone/playNoiseBurst，不引入新的合成逻辑
function playComboBurstSound(streak) {
  const step = Math.min(streak, 20);
  const freq = 500 + step * 40;
  playTone({ freq, duration: 0.14, type: 'triangle', gain: 0.3 });
  playTone({ freq: freq * 1.5, duration: 0.16, type: 'triangle', gain: 0.22 });
  if (streak % 5 === 0) playNoiseBurst(0.25, 0.14);
}

function triggerComboBurst(streak) {
  drawComboBurst(streak);
  comboBurstMesh.visible = true;
  comboBurstStartTime = performance.now();
  playComboBurstSound(streak);
}

function updateComboBurst(now) {
  if (!comboBurstMesh.visible) return;
  const age = now - comboBurstStartTime;
  if (age > COMBO_BURST_LIFETIME) {
    comboBurstMesh.visible = false;
    return;
  }
  let scale, opacity;
  if (age < 200) {
    const t = age / 200;
    scale = 0.4 + t * 0.9 + Math.sin(t * Math.PI) * 0.3; // 弹出时的overshoot缩放，比常规评级文字更夸张
    opacity = t;
  } else if (age < 700) {
    scale = 1.2;
    opacity = 1;
  } else {
    scale = 1.2;
    opacity = Math.max(0, 1 - (age - 700) / (COMBO_BURST_LIFETIME - 700));
  }
  comboBurstMesh.scale.set(scale, scale, 1);
  comboBurstMesh.material.opacity = opacity;
}

// ---------- 过关/失败的全屏闪光反馈 ----------
// 挂在camera正前方很近的位置、够大充满视野的一块半透明Plane，
// depthTest关掉保证不管场景里有什么都盖得住
const flashMat = new THREE.MeshBasicMaterial({
  color: 0xffffff, transparent: true, opacity: 0, depthTest: false, depthWrite: false,
});
const flashMesh = new THREE.Mesh(new THREE.PlaneGeometry(3, 3), flashMat);
flashMesh.position.set(0, 0, -0.28);
flashMesh.renderOrder = 2000;
camera.add(flashMesh);

let flashState = null; // { color, startTime, duration }
function triggerFlash(colorHex, duration = 400) {
  flashState = { color: colorHex, startTime: performance.now(), duration };
}
function updateFlash(now) {
  if (!flashState) {
    flashMat.opacity = 0;
    return;
  }
  const age = now - flashState.startTime;
  if (age >= flashState.duration) {
    flashState = null;
    flashMat.opacity = 0;
    return;
  }
  const t = age / flashState.duration;
  // 前20%快速淡入到峰值，剩余80%淡出，比线性淡入淡出更有"闪"的冲击感
  const opacity = t < 0.2 ? (t / 0.2) * 0.6 : 0.6 * (1 - (t - 0.2) / 0.8);
  flashMat.color.set(flashState.color);
  flashMat.opacity = opacity;
}

// ---------- 关卡切换转场："擦除"式Plane从一侧扫过整个画面 ----------
// 一块不透明的Plane从屏幕左侧扫入盖住画面、在完全盖住的那一刻切换关卡
// 内容(调用enterLevel)、再继续扫到右侧离开画面，全程不透明，"切换"的
// 瞬间用户是看不见的，不会有"啪"一下的生硬感。挂在camera下，位置用
// 本地X坐标做扫动，尺寸给得比较大(2x2.4)，确保不管视野边缘怎么样都能
// 完全盖住。
const wipeMat = new THREE.MeshBasicMaterial({ color: 0x080a10, depthTest: false, depthWrite: false });
const wipeMesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2.4), wipeMat);
wipeMesh.position.set(-3, 0, -0.25);
wipeMesh.renderOrder = 2100; // 比flash(2000)还高，转场时要盖过闪光效果
wipeMesh.visible = false;
camera.add(wipeMesh);

const WIPE_DURATION = 0.9; // 秒，扫入+扫出的总时长
let wipeState = null; // { startTime, nextLevelIndex, midpointFired }

function startLevelWipe(nextLevelIndex) {
  wipeState = { startTime: performance.now(), nextLevelIndex, midpointFired: false };
  wipeMesh.visible = true;
}

function updateWipe(now) {
  if (!wipeState) return;
  const elapsed = (now - wipeState.startTime) / 1000;
  if (elapsed >= WIPE_DURATION) {
    wipeState = null;
    wipeMesh.visible = false;
    return;
  }

  const t = elapsed / WIPE_DURATION;
  // 前一半：从左侧(-3)扫到居中(0)；后一半：从居中扫到右侧(3)离开
  const x = t < 0.5 ? lerp(-3, 0, t / 0.5) : lerp(0, 3, (t - 0.5) / 0.5);
  wipeMesh.position.x = x;

  // 画面被完全盖住的那个中点，正是切换关卡内容的时机——这一帧用户看到
  // 的是纯色遮罩，不会露出"切换过程"
  if (!wipeState.midpointFired && t >= 0.5) {
    wipeState.midpointFired = true;
    enterLevel(wipeState.nextLevelIndex);
  }
}

// ---------- 得分/连击/进度条/过关判定：包在resolveThrow外层的一个函数 ----------
// rawScore是"这一杆的原始分"：第一关是scoreForDistance()算出来的环数分，
// 第二/三关(阶段4实现)会是"命中敌人=固定分/没命中=0"。这个函数本身不
// 关心rawScore具体怎么来的，只负责连击倍率+累计进度+过关判定，所以三关
// 都能直接复用，不用各自重写一遍。
function applyScoreAndCombo(rawScore) {
  if (rawScore >= COMBO_QUALIFY_SCORE) {
    comboStreak += 1;
  } else {
    comboStreak = 0;
  }
  comboMultiplier = comboStreak === 0 ? 1.0 : COMBO_TABLE[Math.min(comboStreak - 1, COMBO_TABLE.length - 1)];

  // 连击里程碑：第3次、第5次，之后每5次(10/15/20...)触发一次专属反馈
  if (comboStreak === 3 || (comboStreak >= 5 && comboStreak % 5 === 0)) {
    triggerComboBurst(comboStreak);
  }

  const finalScore = Math.round(rawScore * comboMultiplier);
  levelScore += finalScore;
  drawProgressBar();

  console.log('[level] rawScore=', rawScore, ' combo x', comboMultiplier, ' finalScore=', finalScore, ' levelScore=', levelScore, '/', LEVEL_THRESHOLDS[currentLevel]);

  if (levelScore >= LEVEL_THRESHOLDS[currentLevel]) {
    onLevelComplete();
  }
  return finalScore;
}

  // "这一关刚打完"，不读写levelScore/lives/碰撞检测的任何状态，卡牌模块
  // 自己决定解锁哪张卡、要不要弹提示，这里不关心也不需要关心。
  notifyLevelCompleted(currentLevel);
  const nextLevel = (currentLevel + 1) % LEVEL_NAMES.length; // 打完第三关循环回第一关，还没做"全部通关"的专门画面
  // 留一点时间让白闪+音效播完，再启动擦除转场——转场扫到画面完全被盖住
  // 的那一刻才会真正调用enterLevel()切换关卡内容(见updateWipe)，不是在
  // 这里立即切换，用户不会看到"啪"一下的生硬瞬间切换。
  setTimeout(() => startLevelWipe(nextLevel), 500);
}

// ========== 通用"移动敌人 + 被保护对象"框架 ==========
// 第二关(狐狸/兔子)、第三关(老鼠/鸡蛋)都用这一套：横向来回移动、命中判定、
// 命中后消失+延迟重生、靠近保护对象判定+扣命、保护对象受惊反弹动画。
// 这一阶段只写通用机制本身，还没有接入具体关卡内容——enemyGroup在没有
// 关卡调用setupEnemyLevel()之前一直是null，updateEnemy()/updateProtected
// Flinch()对此完全安全（开头就return），不会影响第一关的任何现有行为。
let enemyGroup = null;
let protectedGroupRef = null;
let protectedBaseY = 0;
let enemyConfig = null;
// enemyConfig结构：{ z, baseSpeed, dangerDistance, hitRadius?,
//   waypoints: [{x,y}, ...], pauseDuration, pathColor,   // 途经点巡逻模式(现在第二/三关都用这套)
//   pathMinX, pathMaxX, y,                               // 旧的直线往返模式，waypoints不存在时的兜底分支，目前没有关卡在用了
//   speedRampInterval, speedRampAmount,                  // 第二关：每隔多久提速多少
//   sprintEnabled, sprintInterval, sprintDuration, sprintMultiplier } // 第三关：偶尔冲刺，跟途经点/直线两种模式都能叠加

let enemyDirection = 1;
let enemySpeed = 0;
let enemyAlive = true;
let enemyRespawnTimer = 0;
let enemySprinting = false;
let enemySprintTimer = 0;
let levelElapsedTime = 0;
let enemyWaypointIndex = 0; // 途经点模式：当前朝哪个途经点走
let enemyPauseTimer = 0;    // 途经点模式：到达途经点后的停留剩余时间，>0表示暂停中
let enemyBobPhase = 0;      // 停留期间的上下浮动相位（"呵呵笑"待机动画）

const ENEMY_RESPAWN_DELAY = 1.5; // 秒，命中敌人后多久重新出现（用户给的范围是1~2秒，取中间值）
const ENEMY_HIT_RADIUS = 0.18; // 米，投掷物命中点距敌人当前位置多近算命中（默认值，各关可用config.hitRadius覆盖）

// ---------- 被击毙反应：命中后直接在敌人本体上播放的动画，按武器类型区分 ----------
// 2026-07-11第十三轮新增。取代之前"命中后立即隐藏+在别处生成一个独立
// 落点特效"的做法——独立特效的位置来自投掷物轨迹上离敌人最近的点，跟
// 敌人本身有距离误差(见checkMovingEnemySphereHit的说明)，直接把反应
// 动画做在敌人自己身上，天然不存在这个问题。整个动画共用enemyRespawnTimer
// 这一个计时窗口(ENEMY_RESPAWN_DELAY=1.5秒)，不新增独立的计时器，避免
// 两套计时器不同步导致"动画播完了但还没重生"或反过来的情况。
let enemyHitReaction = null; // { weaponType, startTime } / null表示当前没有反应动画在播放
let enemyHitEffectChildren = []; // 挂在enemyGroup下的装饰性子物体(扎入的飞镖/番茄渍)，respawn时清空
const ENEMY_HIT_REACTION_HOLD = 0.9; // 秒，反应姿态(定身/砸扁/倒地)保持的时长，剩余时间(到1.5秒重生为止)用来整体缩小淡出

function clearEnemyHitEffectChildren() {
  if (!enemyGroup) { enemyHitEffectChildren = []; return; }
  for (const child of enemyHitEffectChildren) {
    enemyGroup.remove(child);
    child.traverse((obj) => {
      if (obj.geometry) obj.geometry.dispose();
      if (obj.material) obj.material.dispose();
    });
  }
  enemyHitEffectChildren = [];
}

// 命中瞬间调用一次(见checkMovingEnemySphereHit)，只负责"布置"这次反应
// 需要的装饰物/初始状态，逐帧的动画推进在updateEnemyHitReaction()里做。
function triggerEnemyHitReaction(weaponType) {
  clearEnemyHitEffectChildren();
  enemyGroup.scale.setScalar(1);
  enemyGroup.rotation.set(0, 0, 0);
  enemyHitReaction = { weaponType, startTime: performance.now() };

  if (weaponType === 'dart') {
    // 定身+扎入：敌人本体不做形变(停止移动本身就是"定身"的表现)，插一根
    // 装饰性的小飞镖在身上，形状照抄buildDart()的比例，缩小一半贴合敌人
    // 体型
    const stuckDart = new THREE.Group();
    const tip = new THREE.Mesh(
      new THREE.ConeGeometry(0.008, 0.03, 8),
      new THREE.MeshStandardMaterial({ color: 0xd8d8e0, metalness: 0.7, roughness: 0.3 })
    );
    tip.rotation.x = Math.PI / 2;
    stuckDart.add(tip);
    const shaft = new THREE.Mesh(
      new THREE.CylinderGeometry(0.006, 0.006, 0.05, 8),
      new THREE.MeshStandardMaterial({ color: 0xff6b4a })
    );
    shaft.rotation.x = Math.PI / 2;
    shaft.position.z = 0.038;
    stuckDart.add(shaft);
    stuckDart.position.set(0, 0.02, 0.06); // 插在敌人身体表面附近，示意性位置，不做精确穿模计算
    enemyGroup.add(stuckDart);
    enemyHitEffectChildren.push(stuckDart);
  } else if (weaponType === 'tomato') {
    // 砸中变形+沾番茄渍：形变部分在updateEnemyHitReaction里对enemyGroup.scale
    // 做"砸扁"式挤压，这里只补一块红色渍迹贴在身体表面
    const splat = new THREE.Mesh(
      new THREE.SphereGeometry(0.05, 10, 8),
      new THREE.MeshBasicMaterial({ color: 0xcc2a1e, transparent: true })
    );
    splat.scale.set(1.3, 0.35, 1.1);
    splat.position.set(0, 0.02, 0.05);
    enemyGroup.add(splat);
    enemyHitEffectChildren.push(splat);
  }
  // axe：不需要额外装饰物，震动+倒地完全靠updateEnemyHitReaction()里对
  // enemyGroup.rotation的操作实现
}

// 每帧调用(只在!enemyAlive时，见updateEnemy)，推进当前反应动画。前
// ENEMY_HIT_REACTION_HOLD秒是"反应姿态"，之后到respawn为止整体缩小
// 淡出——respawn那一刻(updateEnemy里enemyRespawnTimer<=0的分支)会强制把
// scale/rotation复位，所以这里不需要担心缩到0之后没人管的问题。
function updateEnemyHitReaction() {
  if (!enemyHitReaction || !enemyGroup) return;
  const age = (performance.now() - enemyHitReaction.startTime) / 1000;
  const weaponType = enemyHitReaction.weaponType;

  if (age < ENEMY_HIT_REACTION_HOLD) {
    if (weaponType === 'tomato') {
      // 前150ms快速砸扁(Y轴骤减/XZ轴增大)，之后维持压扁姿态，
      // 跟spawnTomatoSplat()里落点特效的挤压节奏保持同一手感
      const squashT = Math.min(age / 0.15, 1);
      enemyGroup.scale.set(1 + squashT * 0.25, 1 - squashT * 0.35, 1 + squashT * 0.25);
    } else if (weaponType === 'axe') {
      // 前120ms小幅震动(位置抖动)，之后开始倒地(绕Z轴逐渐转向约80度)，
      // 震动结束后把位置抖动量精确清零，避免跟途经点移动的position赋值
      // 冲突(反正enemyAlive=false时updateWaypointMovement根本不会跑，
      // 这里独立控制position不会和巡逻逻辑打架)
      const shakeT = Math.max(0, 1 - age / 0.12);
      const jitter = shakeT * 0.02;
      enemyGroup.rotation.z = THREE.MathUtils.clamp(age / ENEMY_HIT_REACTION_HOLD, 0, 1) * (Math.PI * 0.42);
      enemyGroup.rotation.x = (Math.random() - 0.5) * jitter;
    }
    // dart：不做任何逐帧形变，纯定身
    return;
  }

  // 收尾阶段：在反应姿态的基础上整体缩小，模拟"消失"
  const shrinkT = Math.min((age - ENEMY_HIT_REACTION_HOLD) / (ENEMY_RESPAWN_DELAY - ENEMY_HIT_REACTION_HOLD), 1);
  const s = Math.max(0.001, 1 - shrinkT);
  if (weaponType === 'tomato') {
    enemyGroup.scale.set(1.25 * s, 0.65 * s, 1.25 * s);
  } else {
    enemyGroup.scale.setScalar(s);
  }
}

// ---------- 巡逻路径可视化引导线 ----------
// 2026-07-11第八轮新增：真机反馈"能不能干脆画一条实际路径，帮助玩家预判
// 轨迹"——用一条虚线(LineDashedMaterial)连接waypoints各点+每个途经点放一个
// 半透明小球标记，颜色跟对应敌人的色调呼应(狐狸暖橙/老鼠冷蓝，见config.pathColor)。
// 这不会削弱挑战性：路径本身仍然是固定的、玩家本来就能通过反复游玩学会，
// 画出来只是把"这是可以学会的规律"这件事从"靠记忆摸索"变成"当场就能看
// 见"，命中本身仍然需要玩家主动瞄准时机，不是画了线就自动命中。
let patrolPathGroup = null;

function disposeObject3D(obj) {
  obj.traverse((child) => {
    if (child.geometry) child.geometry.dispose();
    if (child.material) child.material.dispose();
  });
}

// 2026-07-11第九轮：途经点从{x,y}升级到{x,y,z}，引导线/标记点也要跟着用
// 每个途经点自己的z（不再统一用config.z），才能真实反映三维路径的深度
// 变化，不然引导线会退化成"z轴变化在视觉上完全看不出来"的假三维。
function buildPatrolPathVisual(config) {
  const group = new THREE.Group();
  const color = config.pathColor || 0xffffff;
  const points = config.waypoints.map((wp) => new THREE.Vector3(wp.x, wp.y, wp.z !== undefined ? wp.z : config.z));

  const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
  const lineMat = new THREE.LineDashedMaterial({
    color, dashSize: 0.09, gapSize: 0.06, transparent: true, opacity: 0.6,
  });
  const line = new THREE.Line(lineGeo, lineMat);
  line.computeLineDistances(); // 虚线材质必须调用这个才会有虚线间隔效果
  group.add(line);

  for (const wp of config.waypoints) {
    const marker = new THREE.Mesh(
      new THREE.SphereGeometry(0.035, 8, 6),
      new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.45 })
    );
    marker.position.set(wp.x, wp.y, wp.z !== undefined ? wp.z : config.z);
    group.add(marker);
  }
  return group;
}

// 关卡接入时调用一次，把敌人/保护对象的Object3D和运动参数注册进来
function setupEnemyLevel(enemyGrp, protectedGrp, config) {
  enemyGroup = enemyGrp;
  protectedGroupRef = protectedGrp;
  protectedBaseY = protectedGrp.position.y;
  enemyConfig = config;
  enemySpeed = config.baseSpeed;
  enemyAlive = true;
  enemyRespawnTimer = 0;
  enemySprinting = false;
  enemySprintTimer = 0;
  levelElapsedTime = 0;
  enemyWaypointIndex = 0;
  enemyPauseTimer = 0;
  enemyBobPhase = 0;

  if (patrolPathGroup) {
    scene.remove(patrolPathGroup);
    disposeObject3D(patrolPathGroup);
    patrolPathGroup = null;
  }

  if (config.waypoints) {
    // 途经点模式(现在第二/三关都用)：从第一个途经点(约定为远端/安全端)出发。
    // 途经点现在是{x,y,z}三元组——见下方updateWaypointMovement的说明
    const wp0 = config.waypoints[0];
    enemyGroup.position.set(wp0.x, wp0.y, wp0.z !== undefined ? wp0.z : config.z);
    patrolPathGroup = buildPatrolPathVisual(config);
    scene.add(patrolPathGroup);
  } else {
    // 保护对象放在pathMinX那一侧(danger zone)，敌人要从pathMaxX(远端/安全端)
    // 出发、朝pathMinX移动，玩家才有一段完整的巡逻时间可以反应。之前这里
    // 写成从pathMinX出发，等于敌人一生成就已经站在危险区里，第一帧就扣命
    // ——这是Playwright实测(直接调enterLevel(1)/(2)验证)时发现的真bug，
    // 不是设计意图。
    enemyDirection = -1; // 朝pathMinX(危险区)移动
    enemyGroup.position.set(config.pathMaxX, config.y, config.z);
  }
  enemyGroup.visible = true;
}

// 关卡切换/结束时调用，清掉引用，animate()里的updateEnemy会自动变成no-op
function teardownEnemyLevel() {
  enemyGroup = null;
  protectedGroupRef = null;
  enemyConfig = null;
  if (patrolPathGroup) {
    scene.remove(patrolPathGroup);
    disposeObject3D(patrolPathGroup);
    patrolPathGroup = null;
  }
}

function updateEnemy(dt) {
  if (!enemyGroup || !enemyConfig) return;
  levelElapsedTime += dt;

  // 第二关用：每隔speedRampInterval秒基础速度提升speedRampAmount
  if (enemyConfig.speedRampInterval) {
    const ramps = Math.floor(levelElapsedTime / enemyConfig.speedRampInterval);
    enemySpeed = enemyConfig.baseSpeed + ramps * enemyConfig.speedRampAmount;
  }

  if (!enemyAlive) {
    // 2026-07-11第十三轮：命中后不再立即隐藏(见checkMovingEnemySphereHit的
    // 说明)，被击毙动画期间(updateEnemyHitReaction)敌人会保持可见并做出
    // 定身/砸扁/倒地等反应，动画本身会在收尾阶段把scale缩小到接近0——这里
    // 仍然要每帧调用它，让动画能推进(哪怕已经缩到看不见，逻辑上仍需要跑
    // 到底才清掉状态)。
    updateEnemyHitReaction();
    enemyRespawnTimer -= dt;
    if (enemyRespawnTimer <= 0) {
      enemyAlive = true;
      enemyGroup.visible = true;
      enemyGroup.scale.setScalar(1); // 被击毙动画期间可能缩小/挤压过，重生时必须先复位
      enemyGroup.rotation.set(0, 0, 0); // 斧头命中的倒地旋转同样要复位
      clearEnemyHitEffectChildren(); // 清掉飞镖/番茄渍等挂在敌人身上的装饰物
      enemyHitReaction = null;
      enemyWaypointIndex = 0;
      enemyPauseTimer = 0;
      if (enemyConfig.waypoints) {
        const wp0 = enemyConfig.waypoints[0];
        enemyGroup.position.set(wp0.x, wp0.y, wp0.z !== undefined ? wp0.z : enemyConfig.z);
      } else {
        // 重生也要回到远端(pathMaxX)重新出发，跟setupEnemyLevel同样的道理，
        // 不能直接生成在危险区里
        enemyGroup.position.set(enemyConfig.pathMaxX, enemyConfig.y, enemyConfig.z);
        enemyDirection = -1;
      }
      enemySprinting = false;
      enemySprintTimer = 0;
    }
    return;
  }

  // 第三关用："偶尔冲刺"：每隔sprintInterval秒触发一次持续sprintDuration秒
  // 的加速冲刺，速度乘sprintMultiplier
  let speed = enemySpeed;
  if (enemyConfig.sprintEnabled) {
    enemySprintTimer += dt;
    if (!enemySprinting && enemySprintTimer >= enemyConfig.sprintInterval) {
      enemySprinting = true;
      enemySprintTimer = 0;
    } else if (enemySprinting && enemySprintTimer >= enemyConfig.sprintDuration) {
      enemySprinting = false;
      enemySprintTimer = 0;
    }
    if (enemySprinting) speed *= enemyConfig.sprintMultiplier;
  }

  if (enemyConfig.waypoints) {
    updateWaypointMovement(dt, speed);
  } else {
    enemyGroup.position.x += speed * enemyDirection * dt;
    if (enemyGroup.position.x >= enemyConfig.pathMaxX) {
      enemyGroup.position.x = enemyConfig.pathMaxX;
      enemyDirection = -1;
    } else if (enemyGroup.position.x <= enemyConfig.pathMinX) {
      enemyGroup.position.x = enemyConfig.pathMinX;
      enemyDirection = 1;
    }
  }

  if (protectedGroupRef) {
    const dist = Math.abs(enemyGroup.position.x - protectedGroupRef.position.x);
    if (dist < enemyConfig.dangerDistance) {
      onEnemyReachedProtected();
    }
  }
}

// 途经点巡逻：按固定顺序在waypoints之间移动，到达后停留pauseDuration秒
// （期间做一个上下弹跳的"呵呵笑"待机动画），再继续朝下一个点前进，循环
// 往复。全程严格按预设顺序走，不引入任何随机性——可预测性本身就是这类
// 小游戏的乐趣来源(红白机式设计)，随机移动只会让玩家觉得"不公平"而不是
// "有意思"，2026-07-10按用户明确要求做成这样，不做随机版本。
//
// 2026-07-11第七轮修正：途经点从单纯的x数值改成{x,y}对，同时插值x和y——
// 上一版只让x变化(y全程固定)，本质上仍然是一条直线，只是加了停顿。
//
// 2026-07-11第九轮：再升级成{x,y,z}三元组，同时插值x/y/z三个分量，路径
// 终于用上了VR的深度维度，不再是纯平面的Z字形。z的变化范围经过刻意控制
// （每个关卡config.waypoints里各点的z都收在TARGET_POS.z附近一个区间内，
// 具体数值见LEVEL_ENEMY_CONFIGS和README的参数表）。
// 2026-07-11第十一轮更新：这段注释原本写的是"tryHitEnemy()判定命中只比较
// x/y，从来没用过z，所以z只能往离玩家更近的方向偏、且偏移要保守，否则
// 命中特效跟敌人实际深度会视觉上对不上"——这个理由**已经不成立**了。
// 命中判定这一轮改成了checkMovingEnemySphereHit()的3D球体检测(逐帧比较
// 投掷物飞行线段到敌人当前3D位置的最短距离，见该函数的说明)，x/y/z三个
// 分量现在都会被用上，"z变化导致命中时机跟敌人深度对不上"这个问题已经
// 随之解决——命中点现在就是投掷物飞行线段上离敌人最近的那一点，天然跟
// 敌人的实际3D位置一致，不再依赖固定的靶平面。z的允许范围目前仍然保留
// 着"不超过TARGET_POS.z"这条边界（避免敌人视觉上卡进背板backboard），
// 但这只是美术/穿模考虑，不再是命中判定正确性的约束。
function updateWaypointMovement(dt, speed) {
  const wp = enemyConfig.waypoints;
  const target = wp[enemyWaypointIndex];
  const targetZ = target.z !== undefined ? target.z : enemyConfig.z;

  if (enemyPauseTimer > 0) {
    enemyPauseTimer -= dt;
    enemyBobPhase += dt * 6;
    enemyGroup.position.y = target.y + Math.sin(enemyBobPhase) * 0.025;
    if (enemyPauseTimer <= 0) {
      enemyGroup.position.y = target.y;
      enemyWaypointIndex = (enemyWaypointIndex + 1) % wp.length;
    }
    return;
  }

  const dx = target.x - enemyGroup.position.x;
  const dy = target.y - enemyGroup.position.y;
  const dz = targetZ - enemyGroup.position.z;
  const dist = Math.hypot(dx, dy, dz);
  const step = speed * dt;
  if (dist <= step) {
    enemyGroup.position.x = target.x;
    enemyGroup.position.y = target.y;
    enemyGroup.position.z = targetZ;
    enemyPauseTimer = enemyConfig.pauseDuration || 0;
    enemyBobPhase = 0;
  } else {
    enemyGroup.position.x += (dx / dist) * step;
    enemyGroup.position.y += (dy / dist) * step;
    enemyGroup.position.z += (dz / dist) * step;
  }
}

function onEnemyReachedProtected() {
  loseLife();
  enemyAlive = false;
  enemyGroup.visible = false;
  enemyRespawnTimer = ENEMY_RESPAWN_DELAY;
  triggerProtectedFlinch();
}

// 2026-07-11第十一轮：原来的tryHitEnemy(hitX,hitY)是2D距离检测——只在投掷物
// 穿过固定的靶平面(z=TARGET_POS.z)那一刻，比较落点跟敌人position.x/y的
// 距离，完全没看z。这套逻辑是从"敌人固定巡逻在跟靶同一个z深度"这个前提
// 继承来的，多轮加入z(深度)分量之后，敌人的实际z不再等于TARGET_POS.z，
// 前提已经不成立——真机反馈"看起来穿过了狐狸/老鼠的身体却没算命中"，
// 根因就是这个：投掷物飞行轨迹在敌人所在的实际深度真的经过了它，但
// 判定只在靶平面那个不同的深度上算距离，两者对不上。
//
// 改成真正的3D球体碰撞：每一帧(不再等到穿越靶平面那一刻)比较投掷物这
// 一帧走过的线段(prevPos→newPos，updateFlying()里逐帧积分本来就有这两个
// 点)到敌人当前3D位置的最短距离，小于hitRadius就判定命中，命中点用
// "线段上离敌人最近的那一点"(而不是靶平面上的点——敌人可能根本不在
// 那个深度附近)。这是逐帧离散检测，不是连续碰撞检测(CCD)，但复用的是
// 已经在算的prevDartPos/newDartPos，没有引入新的物理模型；只要投掷物
// 单帧移动距离不会远超hitRadius(狐狸0.48m/老鼠默认0.18m这个量级下，
// 现在的抛物线速度不会走到这么极端)，这个近似足够可靠。
//
// 这段逻辑只在updateFlying()里被`currentLevel !== 0`的分支调用，第一关
// 固定靶面的判定(受保护的crossedPlane代码块)完全没有被改动，也从来不会
// 走到这个函数。
function closestPointOnSegment(point, a, b) {
  const ab = new THREE.Vector3().subVectors(b, a);
  const abLenSq = ab.lengthSq();
  if (abLenSq < 1e-9) return a.clone();
  const t = THREE.MathUtils.clamp(new THREE.Vector3().subVectors(point, a).dot(ab) / abLenSq, 0, 1);
  return a.clone().addScaledVector(ab, t);
}

// 2026-07-11第十三轮：真机反馈"命中位置和动物实际位置经常不一致"。排查
// 后确认碰撞判定本身(下面这个函数的球体检测逻辑)没有问题，问题在于返回值
// ——之前返回的{x,y}是`closest`，也就是投掷物飞行线段上离敌人最近的
// 那一点，不是敌人自己的坐标。因为hitRadius给得比较宽松(狐狸0.48m，比
// 狐狸模型本身的半径大好几倍)，只要投掷物飞行轨迹经过敌人周围0.48米内
// 就算命中，但命中特效之前一直生成在`closest`(轨迹上的点)而不是敌人的
// 真实位置上——两者之间最多能差出0.48米，这正是"命中特效跟动物本体对不
// 上"的根因。这次直接返回`enemyGroup.position`的快照(x/y/z三个分量都有，
// 之前只用x/y)，resolveThrow那边命中特效需要的位置直接读这个快照，不再
// 用轨迹上的`closest`点。
// 同时不再在这里立即隐藏模型——命中反馈从"独立于敌人之外生成一个落点
// 特效"升级成"直接在敌人本体上播放被击毙动画"(见triggerEnemyHitReaction)，
// 动画期间敌人需要保持可见(定身/砸扁/倒地)，隐藏的时机交给
// updateEnemyHitReaction()在动画收尾时通过缩放到0实现，最终在
// updateEnemy()里enemyRespawnTimer归零时统一重置。
function checkMovingEnemySphereHit(prevPos, newPos) {
  if (!enemyGroup || !enemyAlive) return null;
  const hitRadius = (enemyConfig && enemyConfig.hitRadius) || ENEMY_HIT_RADIUS;
  const closest = closestPointOnSegment(enemyGroup.position, prevPos, newPos);
  const dist = closest.distanceTo(enemyGroup.position);
  if (dist < hitRadius) {
    const hitWorldPos = enemyGroup.position.clone(); // 敌人真实位置的快照，在它被冻结之前先拍下来
    enemyAlive = false;
    enemyRespawnTimer = ENEMY_RESPAWN_DELAY;
    return { x: hitWorldPos.x, y: hitWorldPos.y, z: hitWorldPos.z, dist };
  }
  return null;
}

// 被保护对象的受惊反应：短促的上下弹动，不是精确的物理模拟，纯粹是
// 一个衰减的正弦位移
let protectedFlinchTime = 0;
const PROTECTED_FLINCH_DURATION = 0.4;

function triggerProtectedFlinch() {
  protectedFlinchTime = PROTECTED_FLINCH_DURATION;
}

function updateProtectedFlinch(dt) {
  if (!protectedGroupRef) return;
  if (protectedFlinchTime > 0) {
    protectedFlinchTime = Math.max(0, protectedFlinchTime - dt);
    const t = protectedFlinchTime / PROTECTED_FLINCH_DURATION;
    protectedGroupRef.position.y = protectedBaseY + Math.abs(Math.sin(t * Math.PI * 4)) * 0.06 * t;
  } else if (protectedGroupRef.position.y !== protectedBaseY) {
    protectedGroupRef.position.y = protectedBaseY;
  }
}

// ========== 第二关：狐狸抓兔子（狐狸/兔子） / 第三关：老鼠偷蛋（老鼠/鸡蛋） ==========
// 结构复用上面刚做完的敌人/保护对象框架，这里只提供外观模型+关卡参数。
// 都是程序化简单几何体拼接，不追求写实。

function buildRabbit() {
  const group = new THREE.Group();
  // 2026-07-10：颜色调得更偏纯白(0xf5f5f0)，跟狐狸的橙色系拉开辨识度；
  // 耳朵加长(0.09->0.12)，视觉上更像兔子而不是"两个小尖角"
  const mat = new THREE.MeshStandardMaterial({ color: 0xf5f5f0, roughness: 0.85 });
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.08, 10, 8), mat);
  group.add(body);
  for (const side of [-1, 1]) {
    const ear = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.016, 0.12, 6), mat);
    ear.position.set(side * 0.03, 0.135, -0.01);
    ear.rotation.z = side * 0.18;
    group.add(ear);
  }
  // 小尾巴：贴在身体后方的小球，兔子最经典的视觉符号之一，之前完全没有
  const tail = new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 6), mat);
  tail.position.set(-0.08, -0.01, 0);
  group.add(tail);
  return group;
}

function buildFox() {
  const group = new THREE.Group();
  const furMat = new THREE.MeshStandardMaterial({ color: 0xd9701f, roughness: 0.7 });
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.09, 10, 8), furMat);
  body.scale.set(1.35, 0.9, 1); // 拉长一点，示意四足动物的身形轮廓
  group.add(body);

  // 白色肚皮色块：贴在身体下方偏前，橙+白的撞色组合让玩家一眼就能跟
  // 纯白色的兔子分开，之前狐狸整只都是橙色，容易被误认成"另一种兔子"
  const bellyMat = new THREE.MeshStandardMaterial({ color: 0xfaf3e6, roughness: 0.75 });
  const belly = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 6), bellyMat);
  belly.scale.set(1.1, 0.6, 0.85);
  belly.position.set(0.02, -0.04, 0);
  group.add(belly);

  const head = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.09, 8), furMat);
  head.rotation.z = -Math.PI / 2;
  head.position.set(0.13, 0.02, 0);
  group.add(head);

  // 三角尖耳朵：狐狸最标志性的轮廓特征，之前完全没做耳朵，是"认不出是
  // 狐狸"的主因（一个光溜溜的橙色球谁都认不出来）
  for (const side of [-1, 1]) {
    const ear = new THREE.Mesh(new THREE.ConeGeometry(0.025, 0.05, 6), furMat);
    ear.position.set(0.1, 0.075, side * 0.025);
    ear.rotation.x = side * 0.3;
    group.add(ear);
  }

  // 蓬松大尾巴：粗圆锥+球形尾尖堆叠出"毛茸茸"的体积感，比之前单薄的
  // 细长圆锥更容易让人一眼联想到"狐狸尾巴"而不是"老鼠尾巴"
  const tipMat = new THREE.MeshStandardMaterial({ color: 0xf5ead4, roughness: 0.7 });
  const tailBase = new THREE.Mesh(new THREE.ConeGeometry(0.055, 0.16, 8), furMat);
  tailBase.rotation.z = Math.PI / 2.4;
  tailBase.position.set(-0.16, 0.03, 0);
  group.add(tailBase);
  const tailTip = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 6), tipMat);
  tailTip.position.set(-0.24, 0.07, 0);
  group.add(tailTip);

  return group;
}

// 2026-07-11第十轮：主题从"狼救小羊"改成"老鼠偷鸡蛋"（狼的模型形态被
// 反馈更像老鼠，与其硬改模型形状，不如顺势改主题，模型基础不用重新设计）。
// 被保护对象从小羊换成一窝鸡蛋——一个浅棕色鸟巢底座+几颗大小/朝向略有
// 差异的蛋形(拉长的球体)堆在一起，不需要精细建模，几个简单几何体就够
// 表达"一窝鸡蛋"这个意象。
function buildEggNest() {
  const group = new THREE.Group();

  // 鸟巢底座：压扁的圆柱体，深棕色示意编织的枯枝质感
  const nestMat = new THREE.MeshStandardMaterial({ color: 0x5a3d22, roughness: 0.95 });
  const nest = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.09, 0.035, 12), nestMat);
  nest.position.set(0, -0.04, 0);
  group.add(nest);

  // 几颗蛋：球体在Y轴拉长模拟蛋形，大小/位置/颜色深浅略有差异，
  // 堆叠出"一窝"的错落感，不追求写实
  const eggColors = [0xf2e8d5, 0xece0c4, 0xf5efe0];
  const eggSpecs = [
    { x: 0, y: 0.01, z: 0, scale: 1.0, color: eggColors[0] },
    { x: 0.045, y: 0.005, z: 0.03, scale: 0.85, color: eggColors[1] },
    { x: -0.04, y: 0.005, z: -0.03, scale: 0.9, color: eggColors[2] },
    { x: 0.01, y: 0.0, z: -0.05, scale: 0.8, color: eggColors[1] },
  ];
  for (const spec of eggSpecs) {
    const eggMat = new THREE.MeshStandardMaterial({ color: spec.color, roughness: 0.6 });
    const egg = new THREE.Mesh(new THREE.SphereGeometry(0.05, 10, 8), eggMat);
    egg.scale.set(spec.scale * 0.82, spec.scale * 1.08, spec.scale * 0.82); // 拉长+收窄，示意蛋形
    egg.position.set(spec.x, spec.y, spec.z);
    egg.rotation.z = (Math.random() - 0.5) * 0.3; // 轻微随机倾斜，避免几颗蛋看起来完全一样排列
    group.add(egg);
  }

  return group;
}

// ---------- 幽灵手柄引导动画 ----------
// 一个半透明的简化手柄模型（胶囊体+一个小圆环示意扳机护圈），沿一段写死
// 的关键帧路径播放一次"靠近→握持→后摆蓄力→前甩投掷→淡出"的动作，进VR
// 后自动播放一遍，不需要真的做骨骼/IK系统，纯粹是关键帧位置/旋转插值。
function buildGhostHand() {
  const group = new THREE.Group();
  const ghostMat = new THREE.MeshBasicMaterial({
    color: 0x9fd8ff, transparent: true, opacity: 0.55, depthWrite: false,
  });

  const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.028, 0.09, 4, 8), ghostMat);
  body.rotation.x = Math.PI / 2.2; // 让胶囊体的长轴大致沿"握持"的方向倾斜
  group.add(body);

  const guard = new THREE.Mesh(new THREE.TorusGeometry(0.03, 0.006, 6, 12), ghostMat);
  guard.position.set(0, -0.02, 0.05);
  group.add(guard);

  return group;
}

// 关键帧：靠近待抓取位置 → 停留模拟"握持" → 后摆蓄力 → 前甩投掷 → 淡出。
// 位置数值是相对IDLE_POS估的一个大致合理的引导轨迹，不追求精确，能让人
// 看懂"这是在演示抓取+投掷"这个意图就够了。
const GHOST_KEYFRAMES = [
  { t: 0.0, pos: [0.18, 1.28, -0.15], rot: [0, 0.3, 0], opacity: 0 },
  { t: 0.3, pos: [0.18, 1.28, -0.15], rot: [0, 0.3, 0], opacity: 0.55 },
  { t: 0.9, pos: [0.03, 1.30, -0.33], rot: [0, 0.1, 0], opacity: 0.55 }, // 靠近飞镖
  { t: 1.3, pos: [0.03, 1.30, -0.33], rot: [0, 0.1, 0], opacity: 0.75 }, // "握持"瞬间，稍微更亮一点示意按下
  { t: 1.8, pos: [0.28, 1.55, 0.25], rot: [0.5, 0.3, 0.2], opacity: 0.75 }, // 后摆蓄力
  { t: 2.3, pos: [-0.12, 1.32, -0.55], rot: [-0.6, -0.3, -0.2], opacity: 0.75 }, // 前甩投掷
  { t: 2.9, pos: [-0.12, 1.32, -0.55], rot: [-0.6, -0.3, -0.2], opacity: 0 }, // 淡出
];
const GHOST_TOTAL_TIME = GHOST_KEYFRAMES[GHOST_KEYFRAMES.length - 1].t;

let ghostHandPlaying = false;
let ghostHandStartTime = 0;
let ghostHandHasPlayedOnce = false;

function playGhostHandTutorial() {
  if (ghostHandHasPlayedOnce) return; // 只播一遍
  ghostHandPlaying = true;
  ghostHandHasPlayedOnce = true;
  ghostHandStartTime = performance.now();
  ghostHand.visible = true;
}

function lerp(a, b, t) { return a + (b - a) * t; }

function updateGhostHand(now) {
  if (!ghostHandPlaying) return;
  const elapsed = (now - ghostHandStartTime) / 1000;

  if (elapsed >= GHOST_TOTAL_TIME) {
    ghostHandPlaying = false;
    ghostHand.visible = false;
    return;
  }

  // 找到当前时间落在哪两个关键帧之间，做线性插值——关键帧数量很少(7个)，
  // 直接线性扫描完全够用，不需要更复杂的查找结构
  let k0 = GHOST_KEYFRAMES[0];
  let k1 = GHOST_KEYFRAMES[GHOST_KEYFRAMES.length - 1];
  for (let i = 0; i < GHOST_KEYFRAMES.length - 1; i++) {
    if (elapsed >= GHOST_KEYFRAMES[i].t && elapsed <= GHOST_KEYFRAMES[i + 1].t) {
      k0 = GHOST_KEYFRAMES[i];
      k1 = GHOST_KEYFRAMES[i + 1];
      break;
    }
  }
  const segT = k1.t > k0.t ? (elapsed - k0.t) / (k1.t - k0.t) : 0;

  ghostHand.position.set(
    lerp(k0.pos[0], k1.pos[0], segT),
    lerp(k0.pos[1], k1.pos[1], segT),
    lerp(k0.pos[2], k1.pos[2], segT)
  );
  ghostHand.rotation.set(
    lerp(k0.rot[0], k1.rot[0], segT),
    lerp(k0.rot[1], k1.rot[1], segT),
    lerp(k0.rot[2], k1.rot[2], segT)
  );
  const opacity = lerp(k0.opacity, k1.opacity, segT);
  ghostHand.traverse((obj) => {
    if (obj.material) obj.material.opacity = opacity;
  });
}
